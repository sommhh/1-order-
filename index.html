<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現場注文アプリ（完成版）</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body { font-family:sans-serif; padding:10px; background:#f2f2f2;}
button { width:100%; padding:14px; margin:6px 0; font-size:18px;}
input { padding:10px; margin:4px 0; width:100%;}
.item { background:#fff; padding:10px; margin:5px 0; border-radius:8px;}
.loading { color:red; font-weight:bold; }
</style>
</head>

<body>

<h2>📸 OCR読み取り</h2>
<input type="file" accept="image/*" capture="environment" id="camera">
<button id="ocrBtn" onclick="readOCR()" disabled>準備中...</button>

<div id="status"></div>

<h3>🔎 仮リスト（ここで整理）</h3>
<div id="tempList"></div>
<button onclick="addAllToOrder()">✔ 注文に追加</button>

<h3>📋 注文リスト</h3>
<div id="orderList"></div>

<script>
// ===== データ =====
let tempItems = [];
let orderItems = [];
let worker;
let ready = false;

// ===== OCR初期化 =====
async function initOCR(){
  const btn = document.getElementById("ocrBtn");
  const status = document.getElementById("status");

  status.innerText = "OCR準備中...";

  worker = await Tesseract.createWorker();
  await worker.loadLanguage('eng');
  await worker.initialize('eng');

  await worker.setParameters({
    tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-'
  });

  ready = true;
  btn.disabled = false;
  btn.innerText = "読み取り";

  status.innerText = "準備完了";
}
initOCR();

// ===== OCR =====
async function readOCR(){
  const file = camera.files[0];
  if(!file) return alert("画像選択");

  if(!ready) return;

  status.innerHTML = "<div class='loading'>読み取り中...</div>";

  const result = await worker.recognize(file);
  const text = result.data.text;

  tempItems = extractCodes(text);
  renderTemp();

  status.innerText = "完了";
}

// ===== 抽出（精度UP）=====
function extractCodes(text){
  let arr = text.match(/[A-Z0-9\-]{4,}/g) || [];

  return [...new Set(
    arr.filter(x =>
      !/^\d+$/.test(x) && // 数字だけ除外
      x.length >= 4
    )
  )];
}

// ===== 仮リスト =====
function renderTemp(){
  const el = document.getElementById("tempList");
  el.innerHTML = "";

  tempItems.forEach((code,i)=>{
    el.innerHTML += `
    <div class="item">
      <input value="${code}" onchange="editTemp(${i},this.value)">
      数量:<input type="number" value="1" id="tq${i}">
      <button onclick="removeTemp(${i})">削除</button>
    </div>`;
  });
}

// 編集
function editTemp(i,val){
  tempItems[i] = val;
}

// 削除
function removeTemp(i){
  tempItems.splice(i,1);
  renderTemp();
}

// ===== 注文へ追加 =====
function addAllToOrder(){
  tempItems.forEach((code,i)=>{
    let qty = Number(document.getElementById("tq"+i).value);

    let exist = orderItems.find(x=>x.code===code);
    if(exist){
      exist.qty += qty;
    }else{
      orderItems.push({code,qty});
    }
  });

  tempItems = [];
  renderTemp();
  renderOrder();
}

// ===== 注文リスト =====
function renderOrder(){
  const el = document.getElementById("orderList");
  el.innerHTML = "";

  orderItems.forEach((i,index)=>{
    el.innerHTML += `
    <div class="item">
      <b>${i.code}</b>
      数量:<input type="number" value="${i.qty}"
      onchange="orderItems[${index}].qty=this.value">
      <button onclick="removeOrder(${index})">削除</button>
    </div>`;
  });
}

// 削除
function removeOrder(i){
  orderItems.splice(i,1);
  renderOrder();
}
</script>

</body>
</html>
