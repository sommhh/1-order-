<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現場注文</title>

<style>
body{font-family:sans-serif;padding:10px;}
input,button,select{font-size:16px;padding:8px;margin:4px;}
.row{display:flex;align-items:center;}
label{width:60px;}
table{width:100%;border-collapse:collapse;}
td,th{border:1px solid #000;padding:5px;text-align:center;}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px;border-radius:6px;display:none;}
</style>
</head>

<body>

<h3 id="genba">現場未取得</h3>
<button onclick="getAddress()">📍住所取得</button>

<!-- 会社・担当 -->
<div class="row">
<label>会社</label>
<select id="companySelect" onchange="changeCompany()"></select>
<button onclick="addCompany()">＋</button>
</div>

<div class="row">
<label>担当</label>
<select id="personSelect"></select>
<button onclick="addPerson()">＋</button>
</div>

<hr>

<input id="code" placeholder="品番">

<button onclick="openGallery()">🖼</button>
<input type="file" id="gallery" accept="image/*" style="display:none">

<button onclick="minus()">−</button>
<span id="qty">1</span>
<button onclick="plus()">＋</button>

<button onclick="addItem()">追加</button>

<h3>リスト</h3>
<table>
<thead>
<tr><th>No</th><th>品番</th><th>数量</th><th>削除</th></tr>
</thead>
<tbody id="list"></tbody>
</table>

<hr>

<button onclick="copyText()">コピー</button>
<button onclick="sendLine()">LINE</button>
<button onclick="sendMail()">メール</button>
<button onclick="window.print()">印刷</button>

<div id="toast"></div>

<script>
let qty=1;

// 数量
function plus(){qty++;update()}
function minus(){qty--;if(qty<1)qty=1;update()}
function update(){document.getElementById("qty").innerText=qty}

// 追加
function addItem(){
 const code=document.getElementById("code").value;
 if(!code)return;

 const tbody=document.getElementById("list");
 const tr=document.createElement("tr");
 const no=tbody.children.length+1;

 tr.innerHTML=`
 <td>${no}</td>
 <td>${code}</td>
 <td>${qty}</td>
 <td><button onclick="this.closest('tr').remove();renum()">×</button></td>
 `;

 tbody.appendChild(tr);
 document.getElementById("code").value="";
 qty=1;update();
}

function renum(){
 document.querySelectorAll("#list tr").forEach((tr,i)=>{
  tr.children[0].innerText=i+1;
 });
}

// テキスト
function makeText(){
 let text="";
 text+="【現場】"+document.getElementById("genba").innerText+"\n";
 text+="【会社】"+document.getElementById("companySelect").value+"\n";
 text+="【担当】"+document.getElementById("personSelect").value+"\n\n";

 document.querySelectorAll("#list tr").forEach((tr,i)=>{
  text+=(i+1)+". "+tr.children[1].innerText+" × "+tr.children[2].innerText+"\n";
 });

 return text;
}

// コピー
function copyText(){
 navigator.clipboard.writeText(makeText());
 toast("コピー完了");
}

// LINE
function sendLine(){
 const url="https://line.me/R/msg/text/?"+encodeURIComponent(makeText());
 window.open(url);
}

// メール
function sendMail(){
 const body=encodeURIComponent(makeText());
 location.href=`mailto:?subject=現場注文&body=${body}`;
}

// トースト
function toast(msg){
 const t=document.getElementById("toast");
 t.innerText=msg;
 t.style.display="block";
 setTimeout(()=>t.style.display="none",1500);
}

// 住所
function getAddress(){
 navigator.geolocation.getCurrentPosition(async pos=>{
  const lat=pos.coords.latitude;
  const lon=pos.coords.longitude;

  const res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
  const data=await res.json();

  document.getElementById("genba").innerText=data.display_name;
 });
}

// 写真
function openGallery(){
 document.getElementById("gallery").click();
}

// 会社＋担当連動
let companies=JSON.parse(localStorage.getItem("companies")||"{}");

function loadCompanies(){
 const select=document.getElementById("companySelect");
 select.innerHTML="";
 Object.keys(companies).forEach(c=>{
  const opt=document.createElement("option");
  opt.textContent=c;
  select.appendChild(opt);
 });
 changeCompany();
}

function addCompany(){
 const name=prompt("会社名");
 if(!name)return;
 companies[name]=[];
 localStorage.setItem("companies",JSON.stringify(companies));
 loadCompanies();
}

function changeCompany(){
 const company=document.getElementById("companySelect").value;
 const persons=companies[company]||[];

 const select=document.getElementById("personSelect");
 select.innerHTML="";
 persons.forEach(p=>{
  const opt=document.createElement("option");
  opt.textContent=p;
  select.appendChild(opt);
 });
}

function addPerson(){
 const company=document.getElementById("companySelect").value;
 const name=prompt("担当者");
 if(!name)return;

 if(!companies[company])companies[company]=[];
 companies[company].push(name);

 localStorage.setItem("companies",JSON.stringify(companies));
 changeCompany();
}

// 初期
loadCompanies();
</script>

</body>
</html>
