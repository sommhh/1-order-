<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現場注文 完全版</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{font-family:sans-serif;padding:10px;}
input,button,select{font-size:14px;padding:6px;margin:3px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
td,th{border:1px solid #000;padding:4px;text-align:center;}
td[contenteditable]{background:#eef;}
.qty{min-width:30px;display:inline-block;}
textarea{width:100%;height:50px;}
</style>
</head>

<body>

<h3 id="genba">現場未取得</h3>
<button onclick="getAddress()">📍住所取得</button>

<textarea id="comment" placeholder="例：〇日までにお願いします"></textarea>

<button onclick="saveData()">💾保存</button>
<button onclick="loadData()">📂呼び出し</button>

<hr>

<input id="code" placeholder="貼る or OCR">
<button onclick="ocrScan()">📷</button>
<input type="file" id="ocr" accept="image/*" style="display:none">

<button onclick="addItem()">追加</button>

<table>
<thead>
<tr><th>No</th><th>品番</th><th>商品名</th><th>数量</th><th>削除</th></tr>
</thead>
<tbody id="list"></tbody>
</table>

<hr>

<button onclick="copyText()">コピー</button>

<script>
const list = document.getElementById("list");
const codeInput = document.getElementById("code");

// ===== データ安全取得 =====
let master = {};
try{
 master = JSON.parse(localStorage.getItem("master")||"{}");
}catch{
 master = {};
}

// ===== 追加 =====
function addItem(){
 processText(codeInput.value);
 codeInput.value="";
}

// ===== 処理 =====
function processText(text){
 if(!text)return;

 text.split(/\n/).forEach(line=>{
  let t=line.trim().toUpperCase();
  t=t.replace(/[^A-Z0-9\/\-]/g,"");

  if(!t || t.length<4)return;

  addOrUpdate(t, master[t]||"", 1);
 });
}

// ===== 行追加 =====
function addOrUpdate(code,name,qty){
 for(let tr of list.children){
  if(tr.children[1].innerText===code){
   let span=tr.querySelector(".qty");
   span.innerText=parseInt(span.innerText)+qty;
   return;
  }
 }

 const tr=document.createElement("tr");

 tr.innerHTML=`
 <td>${list.children.length+1}</td>
 <td>${code}</td>
 <td contenteditable onblur="saveName(this)">${name}</td>
 <td>
  <button onclick="changeQty(this,-1)">−</button>
  <span class="qty" contenteditable onblur="fixQty(this)">1</span>
  <button onclick="changeQty(this,1)">＋</button>
 </td>
 <td><button onclick="this.closest('tr').remove();renum()">×</button></td>
 `;

 // 行タップ＋
 tr.addEventListener("click",e=>{
  if(e.target.tagName==="BUTTON")return;
  let span=tr.querySelector(".qty");
  span.innerText=parseInt(span.innerText)+1;
 });

 list.appendChild(tr);
}

// ===== 商品名保存（強化版）=====
function saveName(td){
 try{
  const code = td.parentElement.children[1].innerText.trim();
  const name = td.innerText.trim();

  if(!code || !name) return;

  // 上書きOK
  master[code] = name;

  localStorage.setItem("master",JSON.stringify(master));

 }catch{}
}

// ===== 数量 =====
function changeQty(btn,d){
 let span=btn.parentElement.querySelector(".qty");
 let n=parseInt(span.innerText)||1;
 n+=d;
 if(n<1)n=1;
 span.innerText=n;
}

function fixQty(el){
 let n=parseInt(el.innerText);
 if(isNaN(n)||n<1)n=1;
 el.innerText=n;
}

// ===== 保存 =====
function saveData(){
 let data={rows:[]};

 document.querySelectorAll("#list tr").forEach(tr=>{
  data.rows.push([
   tr.children[1].innerText,
   tr.children[2].innerText,
   tr.querySelector(".qty").innerText
  ]);
 });

 localStorage.setItem("save_data",JSON.stringify(data));
 alert("保存OK");
}

// ===== 読込 =====
function loadData(){
 let data=JSON.parse(localStorage.getItem("save_data")||"null");
 if(!data)return;

 list.innerHTML="";
 data.rows.forEach(r=>{
  addOrUpdate(r[0],r[1],parseInt(r[2]));
 });
}

// ===== OCR =====
function ocrScan(){
 document.getElementById("ocr").click();
}

ocr.onchange=async e=>{
 try{
  let file=e.target.files[0];
  if(!file)return;

  let res=await Tesseract.recognize(file,'eng');
  processText(res.data.text);
 }catch{}
};

// ===== コピー =====
function copyText(){
 let text="";
 document.querySelectorAll("#list tr").forEach((tr,i)=>{
  text+=(i+1)+". "+tr.children[1].innerText+" "+tr.children[2].innerText+" × "+tr.querySelector(".qty").innerText+"\n";
 });
 navigator.clipboard.writeText(text);
}

// ===== 住所 =====
function getAddress(){
 navigator.geolocation.getCurrentPosition(async pos=>{
  try{
   let res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
   let data=await res.json();
   genba.innerText=data.display_name;
  }catch{}
 });
}
</script>

</body>
</html>
