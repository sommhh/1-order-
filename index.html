<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現場注文 完成版</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{font-family:sans-serif;padding:10px;}
input,button,select{font-size:16px;padding:8px;margin:4px;}
.row{display:flex;align-items:center;}
label{width:60px;}
table{width:100%;border-collapse:collapse;}
td,th{border:1px solid #000;padding:5px;text-align:center;}
</style>
</head>

<body>

<h3 id="genba">現場未取得</h3>
<button onclick="getAddress()">📍住所取得</button>

<div class="row">
<label>会社</label>
<select id="companySelect" onchange="changeCompany()"></select>
<button onclick="addCompany()">＋</button>
</div>

<div class="row">
<label>担当</label>
<select id="personSelect"></select>
<button onclick="addPerson()">＋</button>
</div>

<hr>

<input id="code" placeholder="ここに貼る or OCR">
<button onclick="ocrScan()">📷OCR</button>
<input type="file" id="ocr" accept="image/*" capture="environment" style="display:none">

<button onclick="addItem()">追加</button>

<h3>リスト</h3>
<table>
<thead>
<tr><th>No</th><th>品番</th><th>商品名</th><th>数量</th><th>削除</th></tr>
</thead>
<tbody id="list"></tbody>
</table>

<hr>

<button onclick="copyText()">コピー</button>
<button onclick="sendLine()">LINE</button>
<button onclick="sendMail()">メール</button>

<script>
// ===== データ =====
let master=JSON.parse(localStorage.getItem("master")||"{}");
let count=JSON.parse(localStorage.getItem("count")||"{}");
let companies=JSON.parse(localStorage.getItem("companies")||"{}");

// ===== 追加（ここが全処理）=====
function addItem(){
 const input=document.getElementById("code").value;

 processText(input);

 document.getElementById("code").value="";
}

// ===== 文字処理（核心）=====
function processText(text){

 const lines=text.split(/\n/);

 lines.forEach(line=>{
  let t=line.trim();

  // 英数字だけ
  t=t.replace(/[^A-Za-z0-9\/\-]/g,"");

  if(!t || t.length<4) return;

  let name=master[t]||"";

  // 使用回数
  count[t]=(count[t]||0)+1;

  addOrUpdate(t,name,1);
 });

 localStorage.setItem("count",JSON.stringify(count));
}

// ===== 重複まとめ =====
function addOrUpdate(code,name,qty){
 const rows=document.querySelectorAll("#list tr");

 for(let tr of rows){
  if(tr.children[1].innerText===code){
   tr.children[3].innerText=Number(tr.children[3].innerText)+qty;
   return;
  }
 }

 const tr=document.createElement("tr");

 tr.innerHTML=`
 <td>${list.children.length+1}</td>
 <td>${code}</td>
 <td contenteditable onblur="saveName(this)">${name}</td>
 <td>${qty}</td>
 <td><button onclick="this.closest('tr').remove();renum()">×</button></td>
 `;

 list.appendChild(tr);
}

// 商品名保存
function saveName(td){
 const code=td.parentElement.children[1].innerText;
 const name=td.innerText;

 if(name){
  master[code]=name;
  localStorage.setItem("master",JSON.stringify(master));
 }
}

// 番号振り直し
function renum(){
 document.querySelectorAll("#list tr").forEach((tr,i)=>{
  tr.children[0].innerText=i+1;
 });
}

// ===== OCR =====
function ocrScan(){
 document.getElementById("ocr").click();
}

document.getElementById("ocr").onchange=async e=>{
 const file=e.target.files[0];
 if(!file)return;

 const {data:{text}}=await Tesseract.recognize(file,'eng');

 processText(text);
};

// ===== 貼り付け =====
document.getElementById("code").addEventListener("paste",function(e){
 const paste=(e.clipboardData||window.clipboardData).getData("text");
 processText(paste);
 e.preventDefault();
});

// ===== コピー =====
function makeText(){
 let text="";
 text+="【現場】"+genba.innerText+"\n";
 text+="【会社】"+companySelect.value+"\n";
 text+="【担当】"+personSelect.value+"\n\n";

 document.querySelectorAll("#list tr").forEach((tr,i)=>{
  text+=(i+1)+". "+tr.children[1].innerText+" "+tr.children[2].innerText+" × "+tr.children[3].innerText+"\n";
 });

 return text;
}

function copyText(){
 navigator.clipboard.writeText(makeText());
}

// ===== LINE =====
function sendLine(){
 window.open("https://line.me/R/msg/text/?"+encodeURIComponent(makeText()));
}

// ===== メール =====
function sendMail(){
 location.href="mailto:?subject=注文&body="+encodeURIComponent(makeText());
}

// ===== 住所 =====
function getAddress(){
 navigator.geolocation.getCurrentPosition(async pos=>{
  const res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
  const data=await res.json();
  genba.innerText=data.display_name;
 });
}

// ===== 会社 =====
function loadCompanies(){
 companySelect.innerHTML="";
 Object.keys(companies).forEach(c=>{
  let o=document.createElement("option");
  o.textContent=c;
  companySelect.appendChild(o);
 });
 changeCompany();
}

function addCompany(){
 let n=prompt("会社名");
 if(!n)return;
 companies[n]=[];
 localStorage.setItem("companies",JSON.stringify(companies));
 loadCompanies();
}

function changeCompany(){
 let list=companies[companySelect.value]||[];
 personSelect.innerHTML="";
 list.forEach(p=>{
  let o=document.createElement("option");
  o.textContent=p;
  personSelect.appendChild(o);
 });
}

function addPerson(){
 let n=prompt("担当者");
 if(!n)return;
 companies[companySelect.value].push(n);
 localStorage.setItem("companies",JSON.stringify(companies));
 changeCompany();
}

// 初期
loadCompanies();
</script>

</body>
</html>
