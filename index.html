<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現場注文リスト</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
body{font-family:sans-serif;margin:5px;padding:0;}
h1{font-size:18px;margin:5px 0;}
input,button{font-size:12px;}
table{width:100%;border-collapse:collapse;table-layout:fixed;}
th,td{border:1px solid #000;padding:2px;font-size:12px;}
td input{width:100%;padding:2px;font-size:12px;box-sizing:border-box;}
td:nth-child(1){width:30%;} /* 品番 */
td:nth-child(2){width:40%;} /* コメント */
td:nth-child(3){width:15%;} /* 数量 */
td:nth-child(4){width:10%;} /* 優先度 */
td:nth-child(5){width:5%;}  /* 削除 */

.tr-normal{background:#fff;}        /* 通常 */
.tr-warn{background:#fff3cd;}      /* 早め */
.tr-urgent{background:#f8d7da;}    /* 至急 */

button{padding:2px;margin:0;}
#screenshotContainer{display:none;}
</style>
</head>
<body>

<h1>現場注文リスト</h1>

<label>現場名: <input id="siteName" placeholder="現場名"></label><br>
<label>住所: <input id="siteAddress" placeholder="住所"></label><br><br>

<h3>注文リスト</h3>
<table id="orderTableMain">
  <thead>
    <tr>
      <th>品番</th>
      <th>コメント</th>
      <th>数量</th>
      <th>優先度</th>
      <th>削除</th>
    </tr>
  </thead>
  <tbody id="orderTable"></tbody>
</table>
<br>
<button onclick="sendList()">メールで送信</button>
<button onclick="shareScreenshot()">LINEで共有（画像）</button>

<div id="screenshotContainer"></div>

<script>
// -------------------- データ & ローカル保存 --------------------
let orderItems = [];

function saveLocal(){ localStorage.setItem("orderItems", JSON.stringify(orderItems)); }
function loadLocal(){
  let data = localStorage.getItem("orderItems");
  if(data) orderItems = JSON.parse(data);
}

// -------------------- 優先度 --------------------
function getIcon(p){
  if(p==="urgent") return "🟥";
  if(p==="warn") return "🟨";
  return "⬜";
}

function cyclePriority(i){
  let p=orderItems[i].priority;
  if(p==="normal") p="warn";
  else if(p==="warn") p="urgent";
  else p="normal";
  orderItems[i].priority=p;
  renderOrder();
  saveLocal();
}

// -------------------- 削除 --------------------
function removeOrder(i){
  orderItems.splice(i,1);
  renderOrder();
  saveLocal();
}

// -------------------- 並び替え --------------------
function sortByPriority(){
  const order = { urgent:0, warn:1, normal:2 };
  orderItems.sort((a,b)=>order[a.priority]-order[b.priority]);
}

// -------------------- renderOrder --------------------
function renderOrder(){
  sortByPriority();
  const table=document.getElementById("orderTable");
  table.innerHTML="";
  orderItems.forEach((item,i)=>{
    let cls="tr-normal";
    if(item.priority==="warn") cls="tr-warn";
    if(item.priority==="urgent") cls="tr-urgent";

    let tr=document.createElement("tr");
    tr.className=cls;
    tr.innerHTML=`
      <td>${item.code}</td>
      <td><input value="${item.comment||''}" onchange="orderItems[${i}].comment=this.value;saveLocal();"></td>
      <td><input type="number" value="${item.qty}" min="1" onchange="orderItems[${i}].qty=Number(this.value);saveLocal();"></td>
      <td><button onclick="cyclePriority(${i})">${getIcon(item.priority)}</button></td>
      <td><button onclick="removeOrder(${i})">✕</button></td>
    `;
    table.appendChild(tr);
  });
}

// -------------------- 注文追加 --------------------
function addItem(code, qty=1, comment=""){
  let exist=orderItems.find(x=>x.code===code);
  if(exist){
    exist.qty += qty;
  }else{
    orderItems.push({code, qty, comment, priority:"normal"});
  }
  renderOrder();
  saveLocal();
}

// -------------------- メール送信 --------------------
function sendList(){
  let text="現場："+document.getElementById("siteName").value+"\n";
  text+="住所："+document.getElementById("siteAddress").value+"\n\n";
  orderItems.forEach(i=>{
    text+=`${getIcon(i.priority)} ${i.code} ${i.comment} 数量:${i.qty}\n`;
  });
  window.location.href="mailto:?subject=注文リスト&body="+encodeURIComponent(text);
}

// -------------------- LINE共有（スクショ） --------------------
async function shareScreenshot(){
  const table = document.getElementById("orderTableMain");
  const container = document.getElementById("screenshotContainer");
  container.innerHTML=""; // 初期化
  container.style.display="block";

  const canvas = await html2canvas(table, {scale:2});
  const img = document.createElement("img");
  img.src = canvas.toDataURL("image/png");
  container.appendChild(img);

  // スマホネイティブ共有
  if(navigator.canShare && navigator.canShare({files: [dataURLtoFile(img.src,"order.png")]})){
    const file = dataURLtoFile(img.src,"order.png");
    navigator.share({files:[file], text:"現場注文リスト"});
  }else{
    alert("画像生成完了。スクリーンショットでLINEに送信してください。");
  }
}

// DataURL → File
function dataURLtoFile(dataurl, filename){
  let arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1],
  bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
  while(n--){ u8arr[n]=bstr.charCodeAt(n); }
  return new File([u8arr], filename, {type:mime});
}

// -------------------- ロード時 --------------------
loadLocal();
renderOrder();
</script>
</body>
</html>
