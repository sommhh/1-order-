<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現場注文</title>

<style>
body{font-family:sans-serif;padding:10px;}
input,button{font-size:16px;padding:8px;margin:4px;}
table{width:100%;border-collapse:collapse;}
td,th{border:1px solid #000;padding:5px;text-align:center;}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px;border-radius:6px;display:none;}
</style>
</head>

<body>

<h3 id="genba">現場未取得</h3>
<button onclick="getAddress()">📍住所取得</button>

<input id="company" placeholder="会社名">
<input id="person" placeholder="担当者">

<hr>

<input id="code" placeholder="品番">
<button onclick="scan()">📷</button>

<button onclick="minus()">−</button>
<span id="qty">1</span>
<button onclick="plus()">＋</button>

<button onclick="addItem()">追加</button>

<h3>リスト</h3>
<table>
<thead>
<tr><th>No</th><th>品番</th><th>数量</th><th>削除</th></tr>
</thead>
<tbody id="list"></tbody>
</table>

<hr>

<button onclick="copyText()">コピー</button>
<button onclick="window.print()">印刷</button>

<hr>

<h3>定型（タップで入力）</h3>
<div id="templates"></div>

<input type="file" id="camera" accept="image/*" capture="environment" style="display:none">

<div id="toast"></div>

<script>
let qty=1;

// 数量
function plus(){qty++;update()}
function minus(){qty--;if(qty<1)qty=1;update()}
function update(){document.getElementById("qty").innerText=qty}

// 追加
function addItem(){
 const code=document.getElementById("code").value;
 if(!code)return;

 const tr=document.createElement("tr");
 const tbody=document.getElementById("list");
 const no=tbody.children.length+1;

 tr.innerHTML=`
 <td>${no}</td>
 <td>${code}</td>
 <td>${qty}</td>
 <td><button onclick="this.closest('tr').remove();renum()">×</button></td>
 `;

 tbody.appendChild(tr);
 document.getElementById("code").value="";
 qty=1;update();
}

// 番号振り直し
function renum(){
 document.querySelectorAll("#list tr").forEach((tr,i)=>{
  tr.children[0].innerText=i+1;
 });
}

// コピー
function copyText(){
 let text="";

 text+="【現場】"+document.getElementById("genba").innerText+"\n";
 text+="【会社】"+document.getElementById("company").value+"\n";
 text+="【担当】"+document.getElementById("person").value+"\n\n";

 document.querySelectorAll("#list tr").forEach((tr,i)=>{
  text+=(i+1)+". "+tr.children[1].innerText+" × "+tr.children[2].innerText+"\n";
 });

 navigator.clipboard.writeText(text);
 toast("コピー完了");
}

// トースト
function toast(msg){
 const t=document.getElementById("toast");
 t.innerText=msg;
 t.style.display="block";
 setTimeout(()=>t.style.display="none",1500);
}

// 住所取得（安定版）
function getAddress(){
 navigator.geolocation.getCurrentPosition(async pos=>{
  const lat=pos.coords.latitude;
  const lon=pos.coords.longitude;

  const res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
  const data=await res.json();

  document.getElementById("genba").innerText=data.display_name;
 });
}

// カメラ
function scan(){
 document.getElementById("camera").click();
}

// 定型文（10個）
let templates = JSON.parse(localStorage.getItem("t")||"[]");

function loadTemplates(){
 const box=document.getElementById("templates");
 box.innerHTML="";

 for(let i=0;i<10;i++){
  const val=templates[i]||"";

  const btn=document.createElement("button");
  btn.textContent=val||("定型"+(i+1));

  btn.onclick=()=>{
   document.getElementById("code").value=val;
  };

  btn.oncontextmenu=(e)=>{
   e.preventDefault();
   const newVal=prompt("編集",val||"");
   if(newVal!==null){
    templates[i]=newVal;
    localStorage.setItem("t",JSON.stringify(templates));
    loadTemplates();
   }
  };

  box.appendChild(btn);
 }
}

loadTemplates();
</script>

</body>
</html>
