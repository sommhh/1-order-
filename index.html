<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現場発注ツール</title>
<style>
  :root {
    --primary: #2563eb;
    --primary-light: #eff6ff;
    --primary-subtle: rgba(37,99,235,0.08);
    --slate-50: #f8fafc;
    --slate-100: #f1f5f9;
    --slate-200: #e2e8f0;
    --slate-300: #cbd5e1;
    --slate-400: #94a3b8;
    --slate-500: #64748b;
    --slate-700: #334155;
    --slate-800: #1e293b;
    --rose-500: #f43f5e;
    --emerald-400: #34d399;
    --emerald-500: #10b981;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: var(--slate-50);
    color: var(--slate-800);
    min-height: 100vh;
    padding-bottom: 160px;
  }

  /* Header */
  header {
    position: sticky; top: 0; z-index: 40;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--slate-200);
  }
  .header-inner { max-width: 672px; margin: 0 auto; padding: 12px 16px; }
  .header-row { display: flex; gap: 8px; align-items: center; }
  .genba-input-wrap {
    flex: 1;
    display: flex; align-items: center;
    background: var(--slate-100); border-radius: 12px; padding: 0 12px;
    min-height: 44px;
    transition: all .2s;
  }
  .genba-input-wrap:focus-within {
    background: #fff;
    box-shadow: 0 0 0 2px var(--primary);
  }
  .genba-input {
    width: 100%; border: none; background: transparent; outline: none;
    font-size: 18px; font-weight: 700; color: var(--slate-800);
    font-family: inherit;
  }
  .btn-addr {
    display: flex; align-items: center; gap: 6px;
    height: 44px; padding: 0 16px;
    background: #fff; border: 1px solid var(--slate-200);
    border-radius: 12px; font-weight: 600; cursor: pointer;
    font-family: inherit; font-size: 14px;
    box-shadow: 0 1px 3px rgba(0,0,0,.05);
    transition: background .15s;
    color: var(--slate-700);
  }
  .btn-addr:hover { background: var(--slate-50); }
  .btn-addr svg { color: var(--primary); }
  .status-bar { height: 20px; font-size: 12px; color: var(--slate-500); margin-top: 4px; padding-left: 4px; }

  /* Main */
  main { max-width: 672px; margin: 0 auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }

  /* Cards */
  .card {
    background: #fff; padding: 16px; border-radius: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
    border: 1px solid var(--slate-100);
  }

  /* Company/Person */
  .company-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .select-group { flex: 1; min-width: 140px; display: flex; gap: 8px; }
  select {
    flex: 1; height: 44px; padding: 0 12px;
    background: var(--slate-50); border: 1px solid var(--slate-200);
    border-radius: 12px; outline: none; font-family: inherit; font-size: 14px;
    color: var(--slate-800); cursor: pointer;
    transition: box-shadow .15s;
  }
  select:focus { box-shadow: 0 0 0 2px var(--primary); }
  .btn-icon {
    width: 44px; height: 44px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--slate-100); border: 1px solid var(--slate-200);
    border-radius: 12px; cursor: pointer; transition: background .15s;
    font-size: 20px; color: var(--slate-700);
  }
  .btn-icon:hover { background: var(--slate-200); }
  textarea {
    width: 100%; min-height: 80px; padding: 12px;
    background: var(--slate-50); border: 1px solid var(--slate-200);
    border-radius: 12px; outline: none; resize: none;
    font-family: inherit; font-size: 14px; color: var(--slate-800);
    margin-top: 12px; transition: box-shadow .15s;
  }
  textarea::placeholder { color: var(--slate-400); }
  textarea:focus { box-shadow: 0 0 0 2px var(--primary); }

  /* Search */
  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--slate-400); pointer-events: none; }
  .search-input {
    width: 100%; height: 48px; padding: 0 16px 0 44px;
    background: var(--slate-50); border: 1px solid var(--slate-200);
    border-radius: 12px; outline: none; font-family: inherit; font-size: 15px;
    color: var(--slate-800); transition: all .2s;
    box-shadow: inset 0 1px 3px rgba(0,0,0,.05);
  }
  .search-input:focus { background: #fff; box-shadow: 0 0 0 2px var(--primary); }
  .suggest-dropdown {
    display: none; position: absolute; top: calc(100% + 8px); left: 0; right: 0;
    background: #fff; border: 1px solid var(--slate-200);
    border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,.12); z-index: 30;
    overflow: hidden;
  }
  .suggest-dropdown.open { display: block; }
  .suggest-item {
    width: 100%; text-align: left; padding: 12px 16px;
    border: none; border-bottom: 1px solid var(--slate-100);
    background: transparent; cursor: pointer; display: flex; gap: 12px; align-items: center;
    font-family: inherit; font-size: 14px; transition: background .12s;
  }
  .suggest-item:last-child { border-bottom: none; }
  .suggest-item:hover { background: var(--slate-50); }
  .suggest-code {
    font-family: monospace; font-weight: 700; color: var(--primary);
    background: var(--primary-subtle); padding: 2px 6px; border-radius: 6px;
    font-size: 13px; white-space: nowrap;
  }
  .suggest-name { color: var(--slate-700); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Quick items */
  .quick-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 8px; margin-top: 16px;
  }
  .quick-btn {
    display: flex; flex-direction: column; align-items: flex-start;
    padding: 10px; background: #fff; border: 1px solid var(--slate-100);
    border-radius: 12px; cursor: pointer; text-align: left;
    box-shadow: 0 1px 3px rgba(0,0,0,.04); transition: all .15s; font-family: inherit;
  }
  .quick-btn:hover { border-color: var(--primary); background: var(--primary-light); }
  .quick-label { font-size: 10px; text-transform: uppercase; color: var(--slate-400); font-weight: 700; letter-spacing: .05em; }
  .quick-code { font-family: monospace; font-weight: 700; font-size: 13px; color: var(--slate-800); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; }
  .quick-name { font-size: 11px; color: var(--slate-500); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; margin-top: 2px; }
  .quick-btn:hover .quick-label, .quick-btn:hover .quick-code { color: var(--primary); }

  /* Code input */
  .code-row { display: flex; gap: 8px; }
  .code-input {
    flex: 1; height: 48px; padding: 0 16px;
    background: var(--slate-50); border: 1px solid var(--slate-200);
    border-radius: 12px; outline: none;
    font-family: monospace; font-size: 15px; font-weight: 700; text-transform: uppercase;
    color: var(--slate-800); transition: box-shadow .15s;
  }
  .code-input:focus { box-shadow: 0 0 0 2px var(--primary); background: #fff; }
  .btn-camera {
    width: 48px; height: 48px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--slate-100); border: 1px solid var(--slate-200);
    border-radius: 12px; cursor: pointer; color: var(--slate-600);
    transition: background .15s;
  }
  .btn-camera:hover { background: var(--slate-200); }
  .btn-add {
    padding: 0 24px; height: 48px;
    background: var(--primary); color: #fff;
    border: none; border-radius: 12px; font-weight: 700; cursor: pointer;
    font-family: inherit; font-size: 15px;
    box-shadow: 0 4px 12px rgba(37,99,235,.25);
    transition: opacity .15s, transform .1s;
  }
  .btn-add:hover { opacity: .9; }
  .btn-add:active { transform: scale(.97); }

  /* Progress bar */
  .progress-wrap { margin-top: 8px; }
  .progress-bar-bg { width: 100%; background: var(--slate-100); height: 8px; border-radius: 99px; overflow: hidden; }
  .progress-bar { height: 100%; background: var(--primary); border-radius: 99px; transition: width .3s; }
  .progress-label { font-size: 10px; text-align: center; margin-top: 4px; color: var(--slate-400); font-weight: 700; text-transform: uppercase; letter-spacing: .1em; }

  /* Table */
  .table-card { background: #fff; border-radius: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.06); border: 1px solid var(--slate-100); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--slate-50); border-bottom: 1px solid var(--slate-200); }
  th { padding: 12px; text-align: left; font-size: 11px; font-weight: 700; color: var(--slate-500); text-transform: uppercase; letter-spacing: .06em; }
  th.center { text-align: center; }
  tbody tr { border-bottom: 1px solid var(--slate-100); transition: background .12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--slate-50); }
  td { padding: 14px 12px; font-size: 14px; }
  td.num { color: var(--slate-400); font-family: monospace; }
  td.code-cell .code-val { font-family: monospace; font-weight: 700; color: var(--primary); white-space: nowrap; }
  .name-input {
    width: 100%; border: none; background: transparent; outline: none;
    font-size: 14px; font-family: inherit; color: var(--slate-800);
  }
  .name-input::placeholder { color: var(--slate-300); }
  .qty-cell { display: flex; align-items: center; justify-content: center; gap: 8px; }
  .qty-btn { background: none; border: none; cursor: pointer; color: var(--slate-400); transition: color .15s, transform .1s; padding: 0; line-height: 1; }
  .qty-btn:hover { color: var(--primary); }
  .qty-btn:active { transform: scale(.9); }
  .qty-val { min-width: 24px; text-align: center; font-weight: 700; color: var(--slate-800); }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--slate-300); transition: color .15s; padding: 0; }
  .del-btn:hover { color: var(--rose-500); }
  .empty-row td { padding: 48px 24px; text-align: center; color: var(--slate-400); font-style: italic; }

  /* Footer */
  footer {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(16px);
    border-top: 1px solid var(--slate-200);
    box-shadow: 0 -4px 24px rgba(0,0,0,.08);
  }
  .footer-inner { max-width: 672px; margin: 0 auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
  .footer-top { display: flex; justify-content: space-between; align-items: flex-end; padding: 0 4px; }
  .totals { display: flex; gap: 24px; }
  .total-item { display: flex; flex-direction: column; }
  .total-label { font-size: 10px; font-weight: 700; color: var(--slate-400); text-transform: uppercase; }
  .total-val { font-size: 22px; font-weight: 900; color: var(--slate-800); line-height: 1.1; }
  .total-val span { font-size: 12px; font-weight: 400; margin-left: 2px; }
  .reset-btn {
    font-size: 12px; font-weight: 700; color: var(--rose-500);
    display: flex; align-items: center; gap: 4px; cursor: pointer;
    background: none; border: none; font-family: inherit;
    padding: 4px 8px; border-radius: 6px; margin-bottom: 4px;
    transition: background .12s;
  }
  .reset-btn:hover { background: #fff1f2; }
  .action-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  @media (min-width: 400px) { .action-grid { grid-template-columns: repeat(7, 1fr); } }
  .action-btn {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; height: 56px;
    background: #fff; border: 1px solid var(--slate-100);
    border-radius: 12px; cursor: pointer; transition: background .12s;
    font-family: inherit;
  }
  .action-btn:hover { background: var(--slate-50); }
  .action-btn.line { background: #f0fdf4; border-color: #d1fae5; }
  .action-btn.line:hover { background: #dcfce7; }
  .action-btn svg { color: var(--slate-600); }
  .action-btn.line svg { color: var(--emerald-500); }
  .action-label { font-size: 10px; font-weight: 700; color: var(--slate-500); }

  /* Toast */
  #toast {
    position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--slate-800); color: #fff;
    padding: 8px 16px; border-radius: 99px; font-size: 14px; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,.2);
    opacity: 0; pointer-events: none; z-index: 60;
    transition: opacity .2s, transform .2s;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast svg { color: var(--emerald-400); }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 50;
    background: rgba(0,0,0,.4); backdrop-filter: blur(4px);
    align-items: center; justify-content: center; padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; width: 100%; max-width: 448px;
    border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,.2);
    display: flex; flex-direction: column; max-height: 80vh;
  }
  .modal-header {
    padding: 16px; border-bottom: 1px solid var(--slate-100);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-header h2 { font-size: 18px; font-weight: 700; }
  .modal-close { width: 32px; height: 32px; border-radius: 99px; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--slate-700); transition: background .12s; }
  .modal-close:hover { background: var(--slate-100); }
  .modal-body { flex: 1; overflow: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
  .save-row { display: flex; gap: 8px; }
  .save-load-btn {
    flex: 1; text-align: left; padding: 12px; border: 1px solid var(--slate-100);
    border-radius: 12px; background: #fff; cursor: pointer; font-family: inherit;
    transition: all .12s;
  }
  .save-load-btn:hover { background: var(--slate-50); border-color: var(--primary); }
  .save-load-btn:hover .save-name { color: var(--primary); }
  .save-name { font-weight: 700; color: var(--slate-800); font-size: 14px; }
  .save-ts { font-size: 12px; color: var(--slate-400); }
  .save-del-btn {
    width: 48px; display: flex; align-items: center; justify-content: center;
    border: none; background: transparent; cursor: pointer; border-radius: 12px;
    color: var(--slate-300); transition: all .12s;
  }
  .save-del-btn:hover { color: var(--rose-500); background: #fff1f2; }
  .modal-footer {
    padding: 16px; background: var(--slate-50); border-top: 1px solid var(--slate-200);
    border-radius: 0 0 20px 20px; display: flex; gap: 8px;
  }
  .btn-import {
    flex: 1; height: 44px; display: flex; align-items: center; justify-content: center; gap: 8px;
    background: #fff; border: 1px solid var(--slate-200); border-radius: 12px;
    font-weight: 600; cursor: pointer; font-family: inherit; font-size: 14px;
    color: var(--slate-700); transition: background .12s;
  }
  .btn-import:hover { background: var(--slate-100); }
  .btn-close-modal {
    flex: 1; height: 44px; background: var(--primary); color: #fff;
    border: none; border-radius: 12px; font-weight: 700; cursor: pointer;
    font-family: inherit; font-size: 14px;
  }
  .empty-save { text-align: center; color: var(--slate-400); padding: 32px 0; font-style: italic; }

  /* Print */
  @media print {
    .no-print { display: none !important; }
    header, footer { display: none !important; }
    body { padding-bottom: 0; background: #fff; }
    .print-header { display: block !important; }
    .card { border: none; box-shadow: none; padding: 0; }
    .table-card { box-shadow: none; border: 1px solid #ccc; }
    .del-btn, .qty-btn, th:last-child, td:last-child { display: none !important; }
  }
  .print-header { display: none; margin-bottom: 24px; }
  .print-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; font-size: 14px; }
  .print-meta-label { font-size: 10px; font-weight: 700; color: #999; text-transform: uppercase; }
</style>
</head>
<body>

<!-- Print Header -->
<div class="print-header">
  <h1 style="font-size:28px;font-weight:900;margin-bottom:16px;">発注書</h1>
  <div class="print-meta">
    <div><div class="print-meta-label">現場名</div><div id="print-genba" style="font-size:18px;"></div></div>
    <div><div class="print-meta-label">発注日</div><div id="print-date" style="font-size:18px;"></div></div>
    <div><div class="print-meta-label">発注元</div><div id="print-company" style="font-size:18px;"></div></div>
  </div>
</div>

<!-- Header -->
<header class="no-print">
  <div class="header-inner">
    <div class="header-row">
      <div class="genba-input-wrap">
        <input id="genba-input" class="genba-input" type="text" placeholder="現場名を入力してください">
      </div>
      <button class="btn-addr" onclick="getAddress()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
        <span>住所取得</span>
      </button>
    </div>
    <div class="status-bar" id="status-bar"></div>
  </div>
</header>

<main>
  <!-- Company & Person -->
  <section class="card no-print">
    <div class="company-row">
      <div class="select-group">
        <select id="company-select" onchange="onCompanyChange()">
          <option value="">会社を選択</option>
        </select>
        <button class="btn-icon" onclick="addCompany()" title="会社追加">+</button>
      </div>
      <div class="select-group">
        <select id="person-select" onchange="onPersonChange()">
          <option value="">担当者を選択</option>
        </select>
        <button class="btn-icon" onclick="addPerson()" title="担当者追加">+</button>
      </div>
    </div>
    <textarea id="biko-input" placeholder="備考（納期、搬入指示など）" oninput="onBikoChange()"></textarea>
  </section>

  <!-- Search -->
  <section class="card no-print">
    <div class="search-wrap" id="search-wrap">
      <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search-input" class="search-input" type="text" placeholder="商品名または品番で検索..." oninput="onSearchInput()" onfocus="onSearchFocus()" onblur="onSearchBlur()">
      <div class="suggest-dropdown" id="suggest-dropdown"></div>
    </div>
    <div class="quick-grid" id="quick-grid"></div>
  </section>

  <!-- Code Input & OCR -->
  <section class="card no-print">
    <div class="code-row">
      <input id="code-input" class="code-input" type="text" placeholder="品番入力 → Enterで追加" onkeydown="onCodeKeydown(event)">
      <button class="btn-camera" onclick="document.getElementById('file-input').click()" title="OCR">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
      </button>
      <input id="file-input" type="file" accept="image/*" capture="environment" style="display:none" onchange="handleOcr(event)">
      <button class="btn-add" onclick="addByCodeInput()">追加</button>
    </div>
    <div class="progress-wrap" id="progress-wrap" style="display:none">
      <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
      <div class="progress-label" id="progress-label">OCR Reading: 0%</div>
    </div>
  </section>

  <!-- Order Table -->
  <section class="table-card">
    <table>
      <thead>
        <tr>
          <th style="width:40px">No</th>
          <th>品番</th>
          <th>商品名</th>
          <th class="center">数量</th>
          <th class="no-print" style="width:40px"></th>
        </tr>
      </thead>
      <tbody id="order-tbody"></tbody>
    </table>
  </section>
</main>

<!-- Footer -->
<footer class="no-print">
  <div class="footer-inner">
    <div class="footer-top">
      <div class="totals">
        <div class="total-item">
          <span class="total-label">種類数</span>
          <span class="total-val" id="total-kinds">0<span>点</span></span>
        </div>
        <div class="total-item">
          <span class="total-label">合計数量</span>
          <span class="total-val" id="total-qty">0<span>個</span></span>
        </div>
      </div>
      <button class="reset-btn" id="reset-btn" onclick="resetItems()" style="display:none">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        リセット
      </button>
    </div>
    <div class="action-grid">
      <button class="action-btn" onclick="handleCopy()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        <span class="action-label">コピー</span>
      </button>
      <button class="action-btn line" onclick="handleLine()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span class="action-label">LINE</span>
      </button>
      <button class="action-btn" onclick="handleMail()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        <span class="action-label">メール</span>
      </button>
      <button class="action-btn" onclick="handleSave()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7"/><path d="M7 3v4a1 1 0 0 0 1 1h7"/></svg>
        <span class="action-label">保存</span>
      </button>
      <button class="action-btn" onclick="openLoadModal()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
        <span class="action-label">読込</span>
      </button>
      <button class="action-btn" onclick="window.print()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        <span class="action-label">印刷</span>
      </button>
      <button class="action-btn" onclick="handleExport()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span class="action-label">出力</span>
      </button>
    </div>
  </div>
</footer>

<!-- Toast -->
<div id="toast">
  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toast-msg"></span>
</div>

<!-- Load Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2>保存リスト</h2>
      <button class="modal-close" onclick="closeModal()">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn-import" onclick="handleImport()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        インポート
      </button>
      <button class="btn-close-modal" onclick="closeModal()">閉じる</button>
    </div>
  </div>
</div>

<script>
// ===== BASE DICTIONARY =====
const BASE_DICTIONARY = {
  'VVF': 'VVFケーブル',
  'VVF1.6-2C': 'VVF 1.6mm 2芯',
  'VVF2.0-2C': 'VVF 2.0mm 2芯',
  'VVF1.6-3C': 'VVF 1.6mm 3芯',
  'VVF2.0-3C': 'VVF 2.0mm 3芯',
  'IV': 'IV電線',
  'WN1302': '埋込ダブルコンセント (パナ)',
  'WT5001': '埋込スイッチB (パナ)',
  'WTP50011WP': 'コスモ埋込スイッチBセット',
  'WN5001': 'フルカラー埋込スイッチB',
  'WVP': '配線器具プレート',
  'DF': '厚鋼電線管',
  'DZ': 'ねじなし電線管',
  'BKW': '漏電ブレーカ',
};

// ===== STATE =====
function loadMasterData() {
  const saved = localStorage.getItem('master_data');
  if (saved) {
    const parsed = JSON.parse(saved);
    return { ...parsed, master: { ...BASE_DICTIONARY, ...parsed.master } };
  }
  return { master: { ...BASE_DICTIONARY }, count: {}, companies: {}, saves: [] };
}

function loadCurrentOrder() {
  const autosave = localStorage.getItem('autosave');
  if (autosave) return JSON.parse(autosave);
  return { genba: '', company: '', person: '', biko: '', items: [] };
}

let masterData = loadMasterData();
let currentOrder = loadCurrentOrder();
let toastTimer = null;
let statusTimer = null;

// ===== PERSISTENCE =====
function saveMasterData() {
  localStorage.setItem('master_data', JSON.stringify(masterData));
}
function saveCurrentOrder() {
  localStorage.setItem('autosave', JSON.stringify(currentOrder));
}

// ===== UTILS =====
function toHalfWidth(str) {
  return str.replace(/[！-～]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0)).replace(/　/g, ' ');
}

function showStatus(msg) {
  document.getElementById('status-bar').textContent = msg;
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => { document.getElementById('status-bar').textContent = ''; }, 3000);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
}

function uuid() {
  if (typeof crypto.randomUUID === 'function') return crypto.randomUUID();
  return Math.random().toString(36).substring(2, 11);
}

// ===== HEADER =====
document.getElementById('genba-input').value = currentOrder.genba;
document.getElementById('genba-input').addEventListener('input', e => {
  currentOrder.genba = e.target.value;
  saveCurrentOrder();
  document.getElementById('print-genba').textContent = e.target.value;
});

// ===== INIT PRINT HEADER =====
document.getElementById('print-genba').textContent = currentOrder.genba;
document.getElementById('print-date').textContent = new Date().toLocaleDateString('ja-JP');
document.getElementById('print-company').textContent = (currentOrder.company || '') + ' ' + (currentOrder.person || '');

// ===== ADDRESS =====
function getAddress() {
  if (!navigator.geolocation) { showStatus('位置情報不可'); return; }
  showStatus('取得中...');
  navigator.geolocation.getCurrentPosition(async pos => {
    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
      const data = await res.json();
      const address = data.display_name || '取得失敗';
      currentOrder.genba = address;
      document.getElementById('genba-input').value = address;
      document.getElementById('print-genba').textContent = address;
      saveCurrentOrder();
      showStatus('住所セット完了');
    } catch { showStatus('取得失敗'); }
  }, () => showStatus('位置情報拒否'));
}

// ===== COMPANY / PERSON =====
function renderCompanySelect() {
  const sel = document.getElementById('company-select');
  sel.innerHTML = '<option value="">会社を選択</option>';
  Object.keys(masterData.companies).forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    sel.appendChild(opt);
  });
  sel.value = currentOrder.company;
}
function renderPersonSelect() {
  const sel = document.getElementById('person-select');
  sel.innerHTML = '<option value="">担当者を選択</option>';
  const persons = masterData.companies[currentOrder.company] || [];
  persons.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p; opt.textContent = p;
    sel.appendChild(opt);
  });
  sel.value = currentOrder.person;
}
function onCompanyChange() {
  currentOrder.company = document.getElementById('company-select').value;
  currentOrder.person = '';
  saveCurrentOrder();
  renderPersonSelect();
  updatePrintMeta();
}
function onPersonChange() {
  currentOrder.person = document.getElementById('person-select').value;
  saveCurrentOrder();
  updatePrintMeta();
}
function updatePrintMeta() {
  document.getElementById('print-company').textContent = (currentOrder.company || '') + ' ' + (currentOrder.person || '');
}
function addCompany() {
  const name = prompt('会社名を入力してください');
  if (!name) return;
  masterData.companies[name] = masterData.companies[name] || [];
  saveMasterData();
  currentOrder.company = name;
  currentOrder.person = '';
  saveCurrentOrder();
  renderCompanySelect();
  renderPersonSelect();
}
function addPerson() {
  if (!currentOrder.company) { alert('先に会社を選択してください'); return; }
  const name = prompt('担当者名を入力してください');
  if (!name) return;
  if (!masterData.companies[currentOrder.company]) masterData.companies[currentOrder.company] = [];
  masterData.companies[currentOrder.company].push(name);
  saveMasterData();
  currentOrder.person = name;
  saveCurrentOrder();
  renderPersonSelect();
}
document.getElementById('biko-input').value = currentOrder.biko;
function onBikoChange() {
  currentOrder.biko = document.getElementById('biko-input').value;
  saveCurrentOrder();
}

// ===== ITEMS =====
function addItemByCode(code, name) {
  const cleanCode = toHalfWidth(code.trim().toUpperCase());
  if (!cleanCode) return;
  const existing = currentOrder.items.find(it => it.code === cleanCode);
  if (existing) {
    existing.qty += 1;
  } else {
    currentOrder.items.push({ id: uuid(), code: cleanCode, name: name || masterData.master[cleanCode] || '未入力', qty: 1 });
  }
  masterData.count[cleanCode] = (masterData.count[cleanCode] || 0) + 1;
  if (name) masterData.master[cleanCode] = name;
  saveMasterData();
  saveCurrentOrder();
  renderTable();
  renderQuickGrid();
  updateFooter();
}

function updateItem(id, key, value) {
  const item = currentOrder.items.find(it => it.id === id);
  if (!item) return;
  item[key] = value;
  if (key === 'name') { masterData.master[item.code] = value; saveMasterData(); }
  saveCurrentOrder();
  if (key === 'qty') renderTable();
  updateFooter();
}

function removeItem(id) {
  if (!confirm('削除しますか？')) return;
  currentOrder.items = currentOrder.items.filter(it => it.id !== id);
  saveCurrentOrder();
  renderTable();
  updateFooter();
}

function resetItems() {
  if (!confirm('リストを全削除しますか？')) return;
  currentOrder.items = [];
  saveCurrentOrder();
  renderTable();
  updateFooter();
}

// ===== RENDER TABLE =====
function renderTable() {
  const tbody = document.getElementById('order-tbody');
  if (currentOrder.items.length === 0) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="5">まだ商品がありません</td></tr>';
    return;
  }
  tbody.innerHTML = currentOrder.items.map((item, idx) => `
    <tr>
      <td class="num">${idx + 1}</td>
      <td class="code-cell"><span class="code-val">${escHtml(item.code)}</span></td>
      <td>
        <input class="name-input no-print" type="text" value="${escHtml(item.name)}" placeholder="商品名を入力"
          onchange="updateItem('${item.id}','name',this.value)">
        <span class="print-only" style="font-size:14px;">${escHtml(item.name)}</span>
      </td>
      <td>
        <div class="qty-cell">
          <button class="qty-btn" onclick="updateItem('${item.id}','qty',Math.max(1,${item.qty}-1))">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          </button>
          <span class="qty-val">${item.qty}</span>
          <button class="qty-btn" onclick="updateItem('${item.id}','qty',${item.qty}+1)">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          </button>
        </div>
      </td>
      <td class="no-print" style="text-align:center;">
        <button class="del-btn" onclick="removeItem('${item.id}')">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
      </td>
    </tr>
  `).join('');
}

function updateFooter() {
  const kinds = currentOrder.items.length;
  const qty = currentOrder.items.reduce((a, it) => a + it.qty, 0);
  document.getElementById('total-kinds').innerHTML = `${kinds}<span>点</span>`;
  document.getElementById('total-qty').innerHTML = `${qty}<span>個</span>`;
  document.getElementById('reset-btn').style.display = kinds > 0 ? 'flex' : 'none';
}

// ===== SEARCH =====
function getSuggestions(q) {
  if (!q) return [];
  const lq = q.toLowerCase();
  return Object.entries(masterData.master)
    .filter(([code, name]) => code.toLowerCase().includes(lq) || name.toLowerCase().includes(lq))
    .sort((a, b) => (masterData.count[b[0]] || 0) - (masterData.count[a[0]] || 0))
    .slice(0, 8);
}

function renderSuggestions(suggestions) {
  const dd = document.getElementById('suggest-dropdown');
  if (!suggestions.length) { dd.classList.remove('open'); return; }
  dd.innerHTML = suggestions.map(([code, name]) => `
    <button class="suggest-item" onmousedown="event.preventDefault();addItemByCode('${escHtml(code)}','${escHtml(name)}');closeSuggestions();">
      <span class="suggest-code">${escHtml(code)}</span>
      <span class="suggest-name">${escHtml(name)}</span>
    </button>
  `).join('');
  dd.classList.add('open');
}

function closeSuggestions() {
  document.getElementById('suggest-dropdown').classList.remove('open');
  document.getElementById('search-input').value = '';
}

function onSearchInput() {
  const q = document.getElementById('search-input').value;
  renderSuggestions(getSuggestions(q));
}
function onSearchFocus() { onSearchInput(); }
function onSearchBlur() { setTimeout(() => document.getElementById('suggest-dropdown').classList.remove('open'), 150); }

// ===== QUICK GRID =====
function renderQuickGrid() {
  const items = Object.entries(masterData.count)
    .sort((a, b) => b[1] - a[1]).slice(0, 12);
  const grid = document.getElementById('quick-grid');
  if (!items.length) { grid.innerHTML = ''; return; }
  grid.innerHTML = items.map(([code]) => `
    <button class="quick-btn" onclick="addItemByCode('${escHtml(code)}')">
      <span class="quick-label">品番</span>
      <span class="quick-code">${escHtml(code)}</span>
      <span class="quick-name">${escHtml(masterData.master[code] || '')}</span>
    </button>
  `).join('');
}

// ===== CODE INPUT =====
function onCodeKeydown(e) {
  if (e.key === 'Enter') { addByCodeInput(); }
}
function addByCodeInput() {
  const input = document.getElementById('code-input');
  addItemByCode(input.value);
  input.value = '';
}

// ===== OCR =====
async function handleOcr(e) {
  const file = e.target.files?.[0];
  if (!file) return;
  setProgress(0);
  try {
    const base64 = await fileToBase64(file);
    setProgress(20); showStatus('AI解析中...');
    // Call Anthropic vision API
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: file.type || 'image/jpeg', data: base64.split(',')[1] } },
            { type: 'text', text: '画像から商品コードと商品名と数量を抽出してJSON配列で返してください。形式: [{"code":"品番","name":"商品名","qty":数量}]。JSONのみ、他のテキストなし。' }
          ]
        }]
      })
    });
    setProgress(80);
    const data = await response.json();
    const text = data.content?.map(c => c.text || '').join('') || '';
    const clean = text.replace(/```json|```/g, '').trim();
    const results = JSON.parse(clean);
    results.forEach(item => {
      const cleanCode = toHalfWidth((item.code || '').trim().toUpperCase());
      if (!cleanCode) return;
      const existing = currentOrder.items.find(it => it.code === cleanCode);
      if (existing) { existing.qty += (item.qty || 1); }
      else { currentOrder.items.push({ id: uuid(), code: cleanCode, name: item.name || masterData.master[cleanCode] || '未入力', qty: item.qty || 1 }); }
      masterData.count[cleanCode] = (masterData.count[cleanCode] || 0) + 1;
      if (item.name) masterData.master[cleanCode] = item.name;
    });
    saveMasterData(); saveCurrentOrder();
    renderTable(); renderQuickGrid(); updateFooter();
    showStatus(`${results.length}件の商品を抽出しました`);
  } catch(err) {
    console.error(err); showStatus('AI解析に失敗しました');
  } finally {
    setProgress(null);
    document.getElementById('file-input').value = '';
  }
}
function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = () => rej(new Error('Read failed'));
    r.readAsDataURL(file);
  });
}
function setProgress(val) {
  const wrap = document.getElementById('progress-wrap');
  if (val === null) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  document.getElementById('progress-bar').style.width = val + '%';
  document.getElementById('progress-label').textContent = `OCR Reading: ${val}%`;
}

// ===== OUTPUT =====
function generateText() {
  const d = currentOrder;
  const date = new Date().toLocaleDateString('ja-JP');
  let t = `【現場】${d.genba || '未設定'}\n【会社】${d.company || ''} ${d.person || ''}\n【日付】${date}\n\n■発注内容\n`;
  d.items.forEach((it, i) => { t += `${i+1}. [${it.code}] ${it.name} ×${it.qty}\n`; });
  if (d.biko) t += `\n【備考】\n${d.biko}\n`;
  t += `\n合計: ${d.items.length}点 / ${d.items.reduce((a,it)=>a+it.qty,0)}個`;
  return t;
}
function handleCopy() { navigator.clipboard.writeText(generateText()); showToast('コピーしました'); }
function handleLine() { window.open(`https://line.me/R/msg/text/?${encodeURIComponent(generateText())}`); }
function handleMail() { window.location.href = `mailto:?subject=${encodeURIComponent('発注書: '+currentOrder.genba)}&body=${encodeURIComponent(generateText())}`; }

// ===== SAVE / LOAD =====
function handleSave() {
  if (!currentOrder.genba) { alert('現場名を入力してください'); return; }
  const name = prompt('保存名を入力してください', currentOrder.genba) || currentOrder.genba;
  localStorage.setItem(`save_v2_${name}`, JSON.stringify({ ...currentOrder, ts: Date.now() }));
  if (!masterData.saves.includes(name)) masterData.saves.push(name);
  saveMasterData();
  showToast('保存しました');
}
function openLoadModal() {
  const list = masterData.saves.map(name => {
    const data = JSON.parse(localStorage.getItem(`save_v2_${name}`) || '{}');
    return { name, ts: data.ts || 0 };
  }).sort((a, b) => b.ts - a.ts);
  const body = document.getElementById('modal-body');
  if (!list.length) { body.innerHTML = '<p class="empty-save">保存されたデータはありません</p>'; }
  else {
    body.innerHTML = list.map(s => `
      <div class="save-row">
        <button class="save-load-btn" onclick="loadSave('${escHtml(s.name)}')">
          <div class="save-name">${escHtml(s.name)}</div>
          <div class="save-ts">${new Date(s.ts).toLocaleString('ja-JP')}</div>
        </button>
        <button class="save-del-btn" onclick="deleteSave('${escHtml(s.name)}')">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
      </div>
    `).join('');
  }
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function loadSave(name) {
  const data = JSON.parse(localStorage.getItem(`save_v2_${name}`) || '{}');
  if (!data.items) return;
  currentOrder = data;
  saveCurrentOrder();
  document.getElementById('genba-input').value = currentOrder.genba;
  document.getElementById('biko-input').value = currentOrder.biko || '';
  renderCompanySelect(); renderPersonSelect();
  renderTable(); updateFooter();
  closeModal(); showToast('データを読み込みました');
}
function deleteSave(name) {
  if (!confirm(`${name} を削除しますか？`)) return;
  localStorage.removeItem(`save_v2_${name}`);
  masterData.saves = masterData.saves.filter(s => s !== name);
  saveMasterData(); openLoadModal();
}
function handleExport() {
  const blob = new Blob([JSON.stringify({ masterData, currentOrder }, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `genba_backup_${new Date().toISOString().slice(0,10)}.json`; a.click();
}
function handleImport() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = async e => {
    const file = e.target.files?.[0]; if (!file) return;
    const text = await file.text();
    try {
      const data = JSON.parse(text);
      if (data.masterData) { masterData = data.masterData; saveMasterData(); }
      if (data.currentOrder) {
        currentOrder = data.currentOrder; saveCurrentOrder();
        document.getElementById('genba-input').value = currentOrder.genba;
        document.getElementById('biko-input').value = currentOrder.biko || '';
        renderCompanySelect(); renderPersonSelect();
        renderTable(); updateFooter();
      }
      showToast('インポート完了'); closeModal();
    } catch { alert('無効なファイル形式です'); }
  };
  input.click();
}

// ===== UTILS =====
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ===== INIT =====
renderCompanySelect();
renderPersonSelect();
renderTable();
renderQuickGrid();
updateFooter();
</script>
</body>
</html>
