<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注文アプリ</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body { font-family:sans-serif; padding:10px; background:#f2f2f2;}
button { width:100%; padding:14px; margin:5px 0; font-size:18px;}
input { padding:8px; width:100%; margin:3px 0;}

.item { background:#fff; padding:10px; margin:5px 0; border-radius:8px;}

table {
  width:100%;
  border-collapse: collapse;
  background:#fff;
}
th,td {
  border:1px solid #000;
  padding:8px;
  text-align:center;
}
th { background:#ddd; }
</style>
</head>

<body>

<h2>📸 OCR</h2>
<input type="file" accept="image/*" capture="environment" id="camera">
<button onclick="readOCR()">読み取り</button>

<div id="status"></div>

<h3>🔎 仮リスト</h3>
<div id="tempList"></div>

<h3>📋 注文リスト（Excel風）</h3>
<div id="excelArea">
<table>
<thead>
<tr>
<th>品番</th>
<th>数量</th>
<th>削除</th>
</tr>
</thead>
<tbody id="orderTable"></tbody>
</table>
</div>

<button onclick="sendLine()">LINE送信</button>
<button onclick="sendMail()">メール送信</button>
<button onclick="capture()">📸スクショ共有</button>

<script>
let tempItems = [];
let orderItems = [];
let worker;

// OCR初期化
(async ()=>{
  worker = await Tesseract.createWorker();
  await worker.loadLanguage('eng');
  await worker.initialize('eng');
})();

// OCR
async function readOCR(){
  const file = camera.files[0];
  if(!file) return;

  status.innerText="読み取り中...";

  const result = await worker.recognize(file);
  tempItems = extract(result.data.text);

  renderTemp();
  status.innerText="完了";
}

// 抽出
function extract(text){
  return [...new Set(
    (text.match(/[A-Z0-9\-]{4,}/g)||[])
  )];
}

// 仮リスト
function renderTemp(){
  tempList.innerHTML="";
  tempItems.forEach((c,i)=>{
    tempList.innerHTML+=`
    <div class="item">
      ${c}
      数量:<input type="number" id="tq${i}" value="1">
      <button onclick="addItem('${c}',${i})">➕追加</button>
      <button onclick="removeTemp(${i})">❌削除</button>
    </div>`;
  });
}

// 仮削除
function removeTemp(i){
  tempItems.splice(i,1);
  renderTemp();
}

// 追加
function addItem(code,i){
  let qty = Number(document.getElementById("tq"+i).value);

  let exist = orderItems.find(x=>x.code===code);
  if(exist){ exist.qty += qty; }
  else{ orderItems.push({code,qty}); }

  renderOrder();
}

// Excel表示
function renderOrder(){
  const el = document.getElementById("orderTable");
  el.innerHTML="";

  orderItems.forEach((i,index)=>{
    el.innerHTML+=`
    <tr>
      <td>${i.code}</td>
      <td><input value="${i.qty}" onchange="orderItems[${index}].qty=this.value"></td>
      <td><button onclick="removeOrder(${index})">削除</button></td>
    </tr>`;
  });
}

// 削除
function removeOrder(i){
  orderItems.splice(i,1);
  renderOrder();
}

// 文字生成
function buildText(){
  let t="【注文】\n";
  orderItems.forEach(i=>{
    t+=`${i.code} × ${i.qty}\n`;
  });
  return t;
}

// LINE
function sendLine(){
  window.open("https://line.me/R/msg/text/?"+encodeURIComponent(buildText()));
}

// メール
function sendMail(){
  location.href="mailto:?body="+encodeURIComponent(buildText());
}

// スクショ
function capture(){
  html2canvas(document.getElementById("excelArea")).then(canvas=>{
    canvas.toBlob(blob=>{
      const file = new File([blob],"order.png",{type:"image/png"});
      if(navigator.share){
        navigator.share({
          files:[file],
          title:"注文リスト"
        });
      }else{
        alert("共有未対応");
      }
    });
  });
}
</script>

</body>
</html>
