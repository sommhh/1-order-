<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現場注文 最終版</title>

<style>
body{font-family:sans-serif;padding:10px;}
input,button,select{font-size:16px;padding:8px;margin:4px;}
.row{display:flex;align-items:center;}
label{width:60px;}
table{width:100%;border-collapse:collapse;}
td,th{border:1px solid #000;padding:5px;text-align:center;}
#suggest{border:1px solid #ccc;max-height:150px;overflow:auto;}
#suggest div{padding:5px;border-bottom:1px solid #eee;cursor:pointer;}
#suggest div:hover{background:#eee;}
</style>
</head>

<body>

<h3 id="genba">現場未取得</h3>
<button onclick="getAddress()">📍住所取得</button>

<div class="row">
<label>会社</label>
<select id="companySelect" onchange="changeCompany()"></select>
<button onclick="addCompany()">＋</button>
</div>

<div class="row">
<label>担当</label>
<select id="personSelect"></select>
<button onclick="addPerson()">＋</button>
</div>

<hr>

<input id="code" placeholder="品番">
<div id="suggest"></div>

<input id="name" placeholder="商品名">

<button onclick="addItem()">追加</button>

<h3>リスト</h3>
<table>
<thead>
<tr><th>No</th><th>品番</th><th>商品名</th><th>数量</th><th>削除</th></tr>
</thead>
<tbody id="list"></tbody>
</table>

<hr>

<input type="file" id="csv" accept=".csv">

<button onclick="copyText()">コピー</button>

<script>
// ===== データ =====
let master=JSON.parse(localStorage.getItem("master")||"{}");
let count=JSON.parse(localStorage.getItem("count")||"{}");
let companies=JSON.parse(localStorage.getItem("companies")||"{}");

// ===== サジェスト =====
code.addEventListener("input",()=>{
 let val=code.value.trim();
 suggest.innerHTML="";

 if(!val) return;

 let list=Object.keys(master)
  .filter(k=>k.includes(val))
  .sort((a,b)=>(count[b]||0)-(count[a]||0));

 list.slice(0,10).forEach(k=>{
  let div=document.createElement("div");
  div.textContent=k+" "+master[k];
  div.onclick=()=>{
   code.value=k;
   name.value=master[k];
   suggest.innerHTML="";
  };
  suggest.appendChild(div);
 });
});

// ===== 追加 =====
function addItem(){
 let c=code.value.trim();
 let n=name.value.trim();
 if(!c)return;

 master[c]=n;
 count[c]=(count[c]||0)+1;

 localStorage.setItem("master",JSON.stringify(master));
 localStorage.setItem("count",JSON.stringify(count));

 addOrUpdate(c,n,1);

 code.value="";name.value="";
 suggest.innerHTML="";
}

// ===== 重複 =====
function addOrUpdate(c,n,q){
 let rows=document.querySelectorAll("#list tr");
 for(let tr of rows){
  if(tr.children[1].innerText===c){
   tr.children[3].innerText=Number(tr.children[3].innerText)+q;
   return;
  }
 }

 let tr=document.createElement("tr");
 tr.innerHTML=`
 <td>${list.children.length+1}</td>
 <td>${c}</td>
 <td>${n}</td>
 <td>${q}</td>
 <td><button onclick="this.closest('tr').remove()">×</button></td>
 `;
 list.appendChild(tr);
}

// ===== CSV =====
csv.onchange=e=>{
 let file=e.target.files[0];
 let reader=new FileReader();

 reader.onload=()=>{
  let lines=reader.result.split("\n");
  lines.forEach(l=>{
   let [c,n]=l.split(",");
   if(c&&n){
    master[c.trim()]=n.trim();
   }
  });
  localStorage.setItem("master",JSON.stringify(master));
  alert("登録完了");
 };
 reader.readAsText(file);
};

// ===== コピー =====
function copyText(){
 let text="";
 document.querySelectorAll("#list tr").forEach((tr,i)=>{
  text+=(i+1)+". "+tr.children[1].innerText+" "+tr.children[2].innerText+" × "+tr.children[3].innerText+"\n";
 });
 navigator.clipboard.writeText(text);
}

// ===== 住所 =====
function getAddress(){
 navigator.geolocation.getCurrentPosition(async pos=>{
  let res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
  let data=await res.json();
  genba.innerText=data.display_name;
 });
}

// ===== 会社 =====
function loadCompanies(){
 companySelect.innerHTML="";
 Object.keys(companies).forEach(c=>{
  let o=document.createElement("option");
  o.textContent=c;
  companySelect.appendChild(o);
 });
 changeCompany();
}

function addCompany(){
 let n=prompt("会社名");
 if(!n)return;
 companies[n]=[];
 localStorage.setItem("companies",JSON.stringify(companies));
 loadCompanies();
}

function changeCompany(){
 let list=companies[companySelect.value]||[];
 personSelect.innerHTML="";
 list.forEach(p=>{
  let o=document.createElement("option");
  o.textContent=p;
  personSelect.appendChild(o);
 });
}

function addPerson(){
 let n=prompt("担当者");
 if(!n)return;
 companies[companySelect.value].push(n);
 localStorage.setItem("companies",JSON.stringify(companies));
 changeCompany();
}

// 初期
loadCompanies();
</script>

</body>
</html>
