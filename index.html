<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現場注文アプリ 安定版</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{font-family:sans-serif;padding:5px;}
button{width:100%;padding:8px;margin:3px 0;}
input{width:100%;padding:4px;}

.item{background:#eee;margin:3px;padding:4px;}
#status{font-size:12px;color:#d00;}
</style>
</head>

<body>

<h3>📸 OCR（連続OK）</h3>
<input type="file" accept="image/*" capture="environment" id="camera">
<button id="ocrBtn" disabled>準備中...</button>
<div id="status"></div>

<h4>読み取り結果</h4>
<div id="tempList"></div>

<script>
let tempItems = [];
let worker = null;
let ready = false;
let reading = false;
let useCount = 0;

// 🔥 OCR初期化
(async()=>{
  status.innerText = "OCR初期化中...";
  worker = await Tesseract.createWorker();
  await worker.loadLanguage('eng');
  await worker.initialize('eng');

  ready = true;
  ocrBtn.disabled = false;
  ocrBtn.innerText = "読み取り";
  status.innerText = "準備OK";
})();

// 🔥 軽量化（これ重要）
async function preprocessImage(file){
  return new Promise(resolve=>{
    let img = new Image();
    img.src = URL.createObjectURL(file);

    img.onload = ()=>{
      let canvas = document.createElement("canvas");
      let ctx = canvas.getContext("2d");

      // サイズ縮小（爆速化）
      let scale = 0.5;
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;

      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      resolve(canvas);
    };
  });
}

// 🔥 workerリセット（フリーズ対策）
async function resetWorker(){
  status.innerText = "リセット中...";
  if(worker){
    await worker.terminate();
  }
  worker = await Tesseract.createWorker();
  await worker.loadLanguage('eng');
  await worker.initialize('eng');
}

// 🔥 OCR実行（安定版）
ocrBtn.onclick = async function(){

  if(reading){
    alert("読み取り中です");
    return;
  }

  if(!ready){
    alert("準備中");
    return;
  }

  let file = camera.files[0];
  if(!file){
    alert("画像選択");
    return;
  }

  reading = true;
  ocrBtn.disabled = true;
  status.innerText = "読み取り中...";

  try{
    useCount++;

    // 🔥 5回ごとにリセット
    if(useCount > 5){
      await resetWorker();
      useCount = 0;
    }

    let processed = await preprocessImage(file);

    let res = await worker.recognize(processed);

    let raw = res.data.text;

    let newItems = [...new Set(
      (raw.match(/[A-Z0-9\-]{4,}/g) || [])
        .filter(x => x.length >= 4)
    )];

    // 🔥 追加方式（前の結果も残す）
    tempItems = [...new Set([...tempItems, ...newItems])];

    renderTemp();

    status.innerText = "完了";

  }catch(e){
    console.error(e);
    status.innerText = "エラー";
  }

  reading = false;
  ocrBtn.disabled = false;
};

// 表示
function renderTemp(){
  tempList.innerHTML = "";
  tempItems.forEach(c=>{
    tempList.innerHTML += `<div class="item">${c}</div>`;
  });
}
</script>

</body>
</html>
