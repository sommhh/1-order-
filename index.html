<script>
'use strict';

/* =========================
   基本
========================= */
var $=s=>document.querySelector(s);
var $$=s=>[...document.querySelectorAll(s)];

function toast(m){
  let t=$('#toast');
  t.textContent=m;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1500);
}

function uid(){
  return Date.now().toString(36)+Math.random().toString(36).slice(2,6);
}

/* =========================
   DB
========================= */
var db,sites=[],cur=null,photos=[],sel=new Set(),floor='1階';

function openDB(){
  return new Promise(res=>{
    let r=indexedDB.open('genba_v20',2);

    r.onupgradeneeded=e=>{
      let d=e.target.result;

      if(!d.objectStoreNames.contains('sites'))
        d.createObjectStore('sites',{keyPath:'id'});

      if(!d.objectStoreNames.contains('photos')){
        let p=d.createObjectStore('photos',{keyPath:'id'});
        p.createIndex('siteId','siteId');
      }
    };

    r.onsuccess=()=>res(r.result);
  });
}

function tx(n,m='readonly'){
  return db.transaction(n,m).objectStore(n);
}

function put(n,o){
  return new Promise(res=>{
    let q=tx(n,'readwrite').put(o);
    q.onsuccess=()=>res(true);
    q.onerror=()=>res(false);
  });
}

function del(n,id){
  return new Promise(r=>{
    tx(n,'readwrite').delete(id).onsuccess=r;
  });
}

function bySite(id){
  return new Promise(r=>{
    tx('photos').index('siteId').getAll(id).onsuccess=e=>r(e.target.result||[]);
  });
}

/* =========================
   AI分類（安全）
========================= */
function aiDetectFloor(c){
  let d=c.getContext('2d').getImageData(0,0,c.width,c.height).data;
  let bright=0;

  for(let i=0;i<d.length;i+=40){
    bright+=(d[i]+d[i+1]+d[i+2])/3;
  }

  let avg=bright/(d.length/4);

  if(avg>140) return '外部';
  if(avg<80) return '1階';
  return '2階';
}

function aiDetectStatus(c){
  let d=c.getContext('2d').getImageData(0,0,c.width,c.height).data;
  let edge=0;

  for(let i=0;i<d.length;i+=80){
    if(d[i]+d[i+1]+d[i+2]>600) edge++;
  }

  if(edge<2000) return '施工前';
  if(edge<5000) return '施工中';
  return '施工後';
}

/* =========================
   Blob + サムネ
========================= */
function canvasToBlob(c){
  return new Promise(r=>c.toBlob(r,'image/jpeg',0.85));
}

function makeThumb(c){
  let t=document.createElement('canvas');
  let size=300;
  t.width=size;
  t.height=size;

  let ctx=t.getContext('2d');

  let w=c.width,h=c.height;
  let s=Math.min(size/w,size/h);

  let nw=w*s,nh=h*s;

  ctx.fillRect(0,0,size,size);
  ctx.drawImage(c,(size-nw)/2,(size-nh)/2,nw,nh);

  return t.toDataURL('image/jpeg',0.6);
}

/* =========================
   撮影
========================= */
async function takePhoto(){

  let v=$('#vid');
  if(!v.videoWidth) return;

  let c=document.createElement('canvas');
  c.width=v.videoWidth;
  c.height=v.videoHeight;

  let ctx=c.getContext('2d');
  ctx.drawImage(v,0,0);

  // AI
  let aiF=aiDetectFloor(c);
  let aiS=aiDetectStatus(c);

  let finalFloor = floor || aiF;
  let finalStatus = $('#stat')?.value || aiS;

  let blob=await canvasToBlob(c);
  let thumb=makeThumb(c);

  let p={
    id:uid(),
    siteId:cur.id,
    floor:finalFloor,
    status:finalStatus,
    ts:Date.now(),
    blob:blob,
    thumb:thumb
  };

  if(await put('photos',p)){
    photos.unshift(p);
    renderPhotos();
    toast('撮影OK');
  }
}

/* =========================
   表示（高速）
========================= */
function renderPhotos(){

  let g=$('#grid');
  g.innerHTML='';

  let list=photos.filter(p=>p.floor===floor);

  list.forEach(p=>{
    let d=document.createElement('div');
    d.className='pic';

    let img=document.createElement('img');

    if(p.thumb) img.src=p.thumb;
    else img.src=p.data;

    d.onclick=()=>{
      if(p.blob){
        let url=URL.createObjectURL(p.blob);
        window.open(url);
        setTimeout(()=>URL.revokeObjectURL(url),2000);
      }else{
        window.open(p.data);
      }
    };

    d.appendChild(img);
    g.appendChild(d);
  });
}

/* =========================
   ZIP
========================= */
async function exportZip(list){

  if(!window.JSZip){
    await new Promise(r=>{
      let s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
      s.onload=r;
      document.head.appendChild(s);
    });
  }

  let zip=new JSZip();

  for(let i=0;i<list.length;i++){
    let p=list[i];

    if(p.blob){
      zip.file(i+'.jpg',p.blob);
    }else{
      let b64=p.data.split(',')[1];
      zip.file(i+'.jpg',b64,{base64:true});
    }
  }

  let blob=await zip.generateAsync({type:'blob'});

  let url=URL.createObjectURL(blob);
  let a=document.createElement('a');
  a.href=url;
  a.download='photos.zip';
  a.click();

  setTimeout(()=>URL.revokeObjectURL(url),2000);
}

/* =========================
   現場削除（完全）
========================= */
async function deleteSite(){

  if(!confirm('現場ごと削除しますか？')) return;

  let id=cur.id;

  let ps=await bySite(id);

  for(let p of ps){
    await del('photos',p.id);
  }

  await del('sites',id);

  sites=sites.filter(s=>s.id!==id);
  photos=[];

  cur=sites[0]||null;

  if(cur){
    loadSite();
  }else{
    location.reload();
  }

  toast('完全削除');
}

/* =========================
   初期化
========================= */
async function init(){
  db=await openDB();
}

init();
</script>
