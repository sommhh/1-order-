<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現場注文アプリ PRO版</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{font-family:sans-serif;margin:0;padding:5px;}
button{width:100%;padding:6px;margin:2px 0;font-size:12px;}
input{width:100%;padding:3px;font-size:12px;box-sizing:border-box;}

table{width:100%;border-collapse:collapse;table-layout:fixed;font-size:11px;}
th,td{border:1px solid #000;padding:1px;text-align:center;}
td input{width:100%;padding:1px;font-size:11px;}

td:nth-child(1){width:35%;}
td:nth-child(2){width:40%;}
td:nth-child(3){width:15%;}
td:nth-child(4){width:10%;}

.item{background:#eee;margin:2px;padding:3px;}
#status{font-size:11px;color:red;}
</style>
</head>

<body>

<h4>現場</h4>
<input id="siteName" placeholder="現場名">
<input id="siteAddress" placeholder="住所">
<button onclick="getLocation()">GPS取得</button>

<h4>OCR（連続OK）</h4>
<input type="file" accept="image/*" capture="environment" id="camera">
<button id="ocrBtn" disabled>準備中</button>
<div id="status"></div>

<h4>仮リスト</h4>
<div id="tempList"></div>

<h4>注文リスト</h4>
<div id="captureArea">
<table>
<tr><th>品番</th><th>内容</th><th>数</th><th>削除</th></tr>
<tbody id="orderTable"></tbody>
</table>
</div>

<button onclick="share()">共有</button>
<button onclick="window.print()">印刷</button>

<script>
let tempItems=[];
let orderItems=[];
let worker;
let queue=[];
let processing=false;

// 初期化
(async()=>{
  status.innerText="OCR準備中...";
  worker=await Tesseract.createWorker();
  await worker.loadLanguage('eng');
  await worker.initialize('eng');
  ocrBtn.disabled=false;
  ocrBtn.innerText="読み取り";
  status.innerText="OK";
})();

// 軽量化
function preprocess(file){
  return new Promise(r=>{
    let img=new Image();
    img.src=URL.createObjectURL(file);
    img.onload=()=>{
      let c=document.createElement("canvas");
      let ctx=c.getContext("2d");
      let scale=0.5;
      c.width=img.width*scale;
      c.height=img.height*scale;
      ctx.drawImage(img,0,0,c.width,c.height);
      r(c);
    };
  });
}

// キュー処理（止まらない核心）
async function runQueue(){
  if(processing) return;
  processing=true;

  while(queue.length>0){
    let file=queue.shift();
    status.innerText="読み取り中...";

    try{
      let img=await preprocess(file);
      let res=await worker.recognize(img);

      let items=[...new Set(
        (res.data.text.match(/[A-Z0-9\-]{4,}/g)||[])
      )];

      tempItems=[...new Set([...tempItems,...items])];
      renderTemp();

    }catch(e){
      console.error(e);
    }
  }

  status.innerText="完了";
  processing=false;
}

// 追加
ocrBtn.onclick=()=>{
  let file=camera.files[0];
  if(!file) return alert("画像選択");
  queue.push(file);
  runQueue();
};

// 仮リスト
function renderTemp(){
  tempList.innerHTML="";
  tempItems.forEach((c,i)=>{
    tempList.innerHTML+=`
    <div class="item">
      ${c}
      <input id="q${i}" type="number" value="1">
      <button onclick="add('${c}',${i})">追加</button>
      <button onclick="delTemp(${i})">削除</button>
    </div>`;
  });
}

function delTemp(i){
  tempItems.splice(i,1);
  renderTemp();
}

// 注文追加
function add(code,i){
  let qty=Number(document.getElementById("q"+i).value);
  let e=orderItems.find(x=>x.code===code);
  if(e) e.qty+=qty;
  else orderItems.push({code,qty,comment:""});
  tempItems.splice(i,1);
  renderTemp();
  renderOrder();
}

// 注文表示
function renderOrder(){
  orderTable.innerHTML="";
  orderItems.forEach((i,n)=>{
    orderTable.innerHTML+=`
    <tr>
      <td>${i.code}</td>
      <td><input value="${i.comment}" onchange="orderItems[${n}].comment=this.value"></td>
      <td><input type="number" value="${i.qty}" onchange="orderItems[${n}].qty=Number(this.value)"></td>
      <td><button onclick="del(${n})">✕</button></td>
    </tr>`;
  });
}

function del(i){
  orderItems.splice(i,1);
  renderOrder();
}

// GPS
function getLocation(){
  navigator.geolocation.getCurrentPosition(async p=>{
    let r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${p.coords.latitude}&lon=${p.coords.longitude}`);
    let d=await r.json();
    siteAddress.value=d.display_name;
  });
}

// 共有
function share(){
  let text=`${siteName.value}\n${siteAddress.value}\n\n`;
  orderItems.forEach(i=>{
    text+=`${i.code} ${i.comment} x${i.qty}\n`;
  });

  if(navigator.share){
    navigator.share({text});
  }else{
    alert(text);
  }
}
</script>

</body>
</html>
