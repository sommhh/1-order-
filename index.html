<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現場注文アプリ 完成版</title>

<style>
body { font-family:sans-serif; background:#111; color:#fff; padding:10px; }
input, textarea, button {
  width:100%; margin:5px 0; padding:10px; font-size:16px;
}
button { background:#f0a500; border:none; font-weight:bold; }
table { width:100%; border-collapse:collapse; margin-top:10px;}
td,th { border:1px solid #444; padding:8px; }
</style>
</head>

<body>

<h2>現場注文</h2>

<input id="site" placeholder="現場名（GPS可・編集OK）">
<button onclick="getGPS()">📍 GPS住所取得</button>

<h3>OCR貼り付け</h3>
<textarea id="ocr" rows="5" placeholder="ここに貼り付け"></textarea>
<button onclick="analyze()">自動解析</button>

<h3>リスト</h3>
<table>
<thead><tr><th>品番</th><th>内容</th><th>数量</th><th></th></tr></thead>
<tbody id="list"></tbody>
</table>

<button onclick="share()">共有</button>
<button onclick="clearAll()">全削除</button>

<script>
let orders = JSON.parse(localStorage.getItem("orders")||"[]");
const list = document.getElementById("list");
const site = document.getElementById("site");

site.value = localStorage.getItem("site")||"";

site.oninput=()=>localStorage.setItem("site",site.value);

// --- 描画 ---
function render(){
  list.innerHTML="";
  orders.forEach((o,i)=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`
    <td contenteditable onblur="upd(${i},'no',this.innerText)">${o.no||""}</td>
    <td contenteditable onblur="upd(${i},'name',this.innerText)">${o.name||""}</td>
    <td contenteditable onblur="upd(${i},'qty',this.innerText)">${o.qty||""}</td>
    <td><button onclick="del(${i})">削除</button></td>
    `;
    list.appendChild(tr);
  });
  localStorage.setItem("orders",JSON.stringify(orders));
}

function upd(i,f,v){ orders[i][f]=v.trim(); save(); }
function del(i){ orders.splice(i,1); render(); }
function save(){ localStorage.setItem("orders",JSON.stringify(orders)); }

// --- OCR解析 ---
function analyze(){
  const text=document.getElementById("ocr").value;
  const lines=text.split("\n");

  lines.forEach(line=>{
    line=line.trim();
    if(!line) return;

    let qty="1";
    let no="";
    let name="";

    // 数量抽出
    const num=line.match(/\d+/g);
    if(num) qty=num[num.length-1];

    // 品番（英数字）
    const code=line.match(/[A-Za-z0-9\.\-]+/);
    if(code) no=code[0];

    // 日本語部分
    name=line.replace(/[A-Za-z0-9\.\-\d]/g,"").trim();

    orders.push({no,name,qty});
  });

  document.getElementById("ocr").value="";
  render();
}

// --- GPS住所 ---
function getGPS(){
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude;
    const lon=pos.coords.longitude;

    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&addressdetails=1`)
    .then(r=>r.json())
    .then(d=>{
      let addr=d.display_name;
      site.value=addr;
      localStorage.setItem("site",addr);
    });
  });
}

// --- 共有 ---
function share(){
  let text="【現場】\n"+site.value+"\n\n";
  orders.forEach(o=>{
    text+=`・${o.no} ${o.name} ${o.qty}個\n`;
  });

  if(navigator.share){
    navigator.share({text});
  }else{
    navigator.clipboard.writeText(text);
    alert("コピーしました");
  }
}

// --- 全削除 ---
function clearAll(){
  if(confirm("削除する？")){
    orders=[];
    render();
  }
}

render();
</script>

</body>
</html>
