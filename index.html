<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現場注文 完全版</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{font-family:sans-serif;padding:10px;}
input,button,select{font-size:14px;padding:6px;margin:3px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
td,th{border:1px solid #000;padding:4px;text-align:center;}
td[contenteditable]{background:#eef;}
.qty{min-width:30px;display:inline-block;}
#suggest div{padding:5px;border-bottom:1px solid #ccc;cursor:pointer;}
.quick button{margin:2px;font-size:12px;}
textarea{width:100%;height:50px;}
</style>
</head>

<body>

<h3 id="genba">現場未取得</h3>
<button onclick="getAddress()">📍住所取得</button>

<div>
会社：
<select id="companySelect" onchange="changeCompany()"></select>
<button onclick="addCompany()">＋</button>

担当：
<select id="personSelect"></select>
<button onclick="addPerson()">＋</button>
</div>

<textarea id="comment" placeholder="備考"></textarea>

<button onclick="saveData()">💾保存</button>
<button onclick="loadData()">📂呼び出し</button>

<hr>

<input id="search" placeholder="商品名検索">
<div id="suggest"></div>
<div class="quick" id="quick"></div>

<hr>

<input id="code" placeholder="貼る or OCR">
<button onclick="ocrScan()">📷</button>
<input type="file" id="ocr" accept="image/*" capture="environment" style="display:none">
<button onclick="addItem()">追加</button>

<table>
<thead>
<tr><th>No</th><th>品番</th><th>商品名</th><th>数量</th><th>削除</th></tr>
</thead>
<tbody id="list"></tbody>
</table>

<hr>

<button onclick="copyText()">コピー</button>
<button onclick="sendLine()">LINE</button>
<button onclick="sendMail()">メール</button>
<button onclick="printData()">印刷</button>

<script>
const list=document.getElementById("list");
const suggest=document.getElementById("suggest");
const quick=document.getElementById("quick");

let master={},count={},companies={};

try{
 master=JSON.parse(localStorage.getItem("master")||"{}");
 count=JSON.parse(localStorage.getItem("count")||"{}");
 companies=JSON.parse(localStorage.getItem("companies")||"{}");
}catch{}

// ===== 住所 =====
function getAddress(){
 navigator.geolocation.getCurrentPosition(async pos=>{
  try{
   let res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
   let data=await res.json();
   genba.innerText=data.display_name||"取得失敗";
  }catch{
   genba.innerText="取得失敗";
  }
 });
}

// ===== 会社 =====
function loadCompanies(){
 companySelect.innerHTML="";
 Object.keys(companies).forEach(c=>{
  let o=document.createElement("option");
  o.textContent=c;
  companySelect.appendChild(o);
 });
 changeCompany();
}

function addCompany(){
 let n=prompt("会社名");
 if(!n)return;
 companies[n]=[];
 localStorage.setItem("companies",JSON.stringify(companies));
 loadCompanies();
}

function changeCompany(){
 let listData=companies[companySelect.value]||[];
 personSelect.innerHTML="";
 listData.forEach(p=>{
  let o=document.createElement("option");
  o.textContent=p;
  personSelect.appendChild(o);
 });
}

function addPerson(){
 let c=companySelect.value;
 if(!c)return alert("会社選択して");
 let n=prompt("担当者");
 if(!n)return;
 companies[c].push(n);
 localStorage.setItem("companies",JSON.stringify(companies));
 changeCompany();
}

// ===== 検索 =====
search.oninput=function(){
 let val=this.value.toLowerCase();
 suggest.innerHTML="";
 if(!val)return;

 let arr=Object.entries(master)
  .filter(([c,n])=>n.toLowerCase().includes(val))
  .sort((a,b)=>(count[b[0]]||0)-(count[a[0]]||0));

 arr.slice(0,10).forEach(([c,n])=>{
  let d=document.createElement("div");
  d.textContent=c+" "+n;
  d.onclick=()=>addOrUpdate(c,n,1);
  suggest.appendChild(d);
 });
}

// ===== よく使う =====
function renderQuick(){
 quick.innerHTML="";
 let arr=Object.entries(count)
  .sort((a,b)=>b[1]-a[1])
  .slice(0,8);

 arr.forEach(([c])=>{
  let b=document.createElement("button");
  b.textContent=c+" "+(master[c]||"");
  b.onclick=()=>addOrUpdate(c,master[c]||"",1);
  quick.appendChild(b);
 });
}

// ===== OCR =====
function ocrScan(){ocr.click();}
ocr.onchange=async e=>{
 try{
  let f=e.target.files[0];
  if(!f)return;
  let r=await Tesseract.recognize(f,'eng');
  processText(r.data.text);
 }catch{}
};

// ===== 処理 =====
function processText(text){
 if(!text)return;

 text.split(/\n/).forEach(line=>{
  let t=line.trim().toUpperCase().replace(/[^A-Z0-9\/\-]/g,"");
  if(!t||t.length<5)return;
  addOrUpdate(t,master[t]||"",1);
 });
}

// ===== 行 =====
function addOrUpdate(code,name,qty){
 for(let tr of list.children){
  if(tr.children[1].innerText===code){
   let span=tr.querySelector(".qty");
   span.innerText=parseInt(span.innerText)+qty;
   return;
  }
 }

 let tr=document.createElement("tr");

 tr.innerHTML=`
 <td>${list.children.length+1}</td>
 <td>${code}</td>
 <td contenteditable onblur="saveName(this)">${name||"未入力"}</td>
 <td>
  <button onclick="changeQty(this,-1)">−</button>
  <span class="qty" contenteditable onblur="fixQty(this)">1</span>
  <button onclick="changeQty(this,1)">＋</button>
 </td>
 <td><button onclick="this.closest('tr').remove();renum()">×</button></td>
 `;

 tr.addEventListener("click",e=>{
  if(e.target.tagName==="BUTTON"||e.target.isContentEditable||e.target.classList.contains("qty"))return;
  let span=tr.querySelector(".qty");
  span.innerText=parseInt(span.innerText)+1;
 });

 list.appendChild(tr);

 count[code]=(count[code]||0)+1;
 localStorage.setItem("count",JSON.stringify(count));
 renderQuick();
}

// ===== 商品名保存 =====
function saveName(td){
 let code=td.parentElement.children[1].innerText;
 let name=td.innerText.trim();
 if(!name)return;
 master[code]=name;
 localStorage.setItem("master",JSON.stringify(master));
}

// ===== 数量 =====
function changeQty(btn,d){
 let span=btn.parentElement.querySelector(".qty");
 let n=parseInt(span.innerText)||1;
 n+=d;
 if(n<1)n=1;
 span.innerText=n;
}

function fixQty(el){
 let n=parseInt(el.innerText);
 if(isNaN(n)||n<1)n=1;
 el.innerText=n;
}

// ===== 保存 =====
function saveData(){
 if(!confirm("保存する？"))return;

 let data={genba:genba.innerText,rows:[]};

 document.querySelectorAll("#list tr").forEach(tr=>{
  data.rows.push([
   tr.children[1].innerText,
   tr.children[2].innerText,
   tr.querySelector(".qty").innerText
  ]);
 });

 localStorage.setItem("save_"+data.genba,JSON.stringify(data));
 alert("保存OK");
}

function loadData(){
 let key=prompt("現場名入力");
 let data=JSON.parse(localStorage.getItem("save_"+key)||"null");
 if(!data)return alert("なし");

 list.innerHTML="";
 data.rows.forEach(r=>{
  addOrUpdate(r[0],r[1],parseInt(r[2]));
 });
}

// ===== 出力 =====
function makeText(){
 let t="【現場】"+genba.innerText+"\n\n";
 document.querySelectorAll("#list tr").forEach((tr,i)=>{
  t+=(i+1)+". "+tr.children[1].innerText+" "+tr.children[2].innerText+" × "+tr.querySelector(".qty").innerText+"\n";
 });
 if(comment.value)t+="\n備考："+comment.value;
 return t;
}

function copyText(){navigator.clipboard.writeText(makeText());}
function sendLine(){window.open("https://line.me/R/msg/text/?"+encodeURIComponent(makeText()));}
function sendMail(){location.href="mailto:?subject=注文&body="+encodeURIComponent(makeText());}

function printData(){
 let w=window.open("");
 let html="<h2>注文書</h2><table border='1'>";
 document.querySelectorAll("#list tr").forEach((tr,i)=>{
  html+=`<tr><td>${i+1}</td><td>${tr.children[1].innerText}</td><td>${tr.children[2].innerText}</td><td>${tr.querySelector(".qty").innerText}</td></tr>`;
 });
 html+="</table>";
 w.document.write(html);
 w.print();
}

// 初期
loadCompanies();
renderQuick();
</script>

</body>
</html>
