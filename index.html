<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現場注文 完全版</title>

<style>
body{font-family:sans-serif;padding:10px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
td,th{border:1px solid #000;padding:4px;text-align:center;}
.qty{min-width:30px;display:inline-block;}
.print-table{width:100%;border-collapse:collapse;}
.print-table td,.print-table th{border:1px solid #000;padding:6px;}
</style>
</head>

<body>

<h3 id="genba">現場未取得</h3>
<textarea id="comment" placeholder="備考"></textarea>

<input id="code" placeholder="貼る">
<button onclick="addItem()">追加</button>

<table>
<thead>
<tr><th>No</th><th>品番</th><th>商品名</th><th>数量</th><th>削除</th></tr>
</thead>
<tbody id="list"></tbody>
</table>

<hr>
<button onclick="copyText()">コピー</button>
<button onclick="sendLine()">LINE</button>
<button onclick="sendMail()">メール</button>
<button onclick="printData()">印刷</button>

<script>
const list=document.getElementById("list");

// ===== 追加 =====
function addItem(){
 let text=document.getElementById("code").value;
 if(!text)return;

 text.split(/\n/).forEach(line=>{
  let t=line.trim().toUpperCase().replace(/[^A-Z0-9\/\-]/g,"");
  if(t.length<4)return;

  addRow(t,"",1);
 });

 code.value="";
}

// ===== 行追加 =====
function addRow(code,name,qty){
 for(let tr of list.children){
  if(tr.children[1].innerText===code){
   let span=tr.querySelector(".qty");
   span.innerText=parseInt(span.innerText)+1;
   return;
  }
 }

 let tr=document.createElement("tr");

 tr.innerHTML=`
 <td>${list.children.length+1}</td>
 <td>${code}</td>
 <td contenteditable>${name}</td>
 <td>
  <button onclick="chg(this,-1)">−</button>
  <span class="qty" contenteditable onblur="fix(this)">1</span>
  <button onclick="chg(this,1)">＋</button>
 </td>
 <td><button onclick="this.closest('tr').remove();renum()">×</button></td>
 `;

 tr.addEventListener("click",e=>{
  if(e.target.tagName==="BUTTON"||e.target.isContentEditable)return;
  let span=tr.querySelector(".qty");
  span.innerText=parseInt(span.innerText)+1;
 });

 list.appendChild(tr);
}

// ===== 数量 =====
function chg(btn,d){
 let span=btn.parentElement.querySelector(".qty");
 let n=parseInt(span.innerText)||1;
 n+=d;
 if(n<1)n=1;
 span.innerText=n;
}

function fix(el){
 let n=parseInt(el.innerText);
 if(isNaN(n)||n<1)n=1;
 el.innerText=n;
}

// ===== 番号 =====
function renum(){
 [...list.children].forEach((tr,i)=>{
  tr.children[0].innerText=i+1;
 });
}

// ===== テキスト =====
function makeText(){
 let t="【現場】"+genba.innerText+"\n\n";

 [...list.children].forEach((tr,i)=>{
  t+=(i+1)+". "+tr.children[1].innerText+" "+tr.children[2].innerText+" × "+tr.querySelector(".qty").innerText+"\n";
 });

 let c=comment.value;
 if(c)t+="\n備考："+c;

 return t;
}

// ===== 出力 =====
function copyText(){navigator.clipboard.writeText(makeText());}

function sendLine(){
 window.open("https://line.me/R/msg/text/?"+encodeURIComponent(makeText()));
}

function sendMail(){
 location.href="mailto:?subject=注文&body="+encodeURIComponent(makeText());
}

// ===== 印刷（ここが本命）=====
function printData(){
 let w=window.open("");

 let html=`
 <h2>注文書</h2>
 <p>現場：${genba.innerText}</p>

 <table class="print-table">
 <tr><th>No</th><th>品番</th><th>商品名</th><th>数量</th></tr>
 `;

 [...list.children].forEach((tr,i)=>{
  html+=`
  <tr>
   <td>${i+1}</td>
   <td>${tr.children[1].innerText}</td>
   <td>${tr.children[2].innerText}</td>
   <td>${tr.querySelector(".qty").innerText}</td>
  </tr>`;
 });

 html+=`</table>`;

 if(comment.value){
  html+=`<p>備考：${comment.value}</p>`;
 }

 w.document.write(html);
 w.print();
}
</script>

</body>
</html>
