<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現場注文アプリ</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{font-family:sans-serif;padding:5px;}
button{width:100%;padding:10px;margin:3px 0;}
input{width:100%;padding:5px;}

table{width:100%;border-collapse:collapse;table-layout:fixed;}
th,td{border:1px solid #000;padding:2px;font-size:12px;}
td input{width:100%;font-size:12px;padding:2px;}

td:nth-child(1){width:35%;}
td:nth-child(2){width:40%;}
td:nth-child(3){width:15%;}
td:nth-child(4){width:10%;}

.item{background:#eee;margin:3px;padding:5px;}
</style>
</head>

<body>

<h3>現場</h3>
<input id="siteName" placeholder="現場名">
<input id="siteAddress" placeholder="住所">

<h3>📸 OCR</h3>
<input type="file" accept="image/*" capture="environment" id="camera">
<button id="ocrBtn">読み取り</button>
<div id="status"></div>

<h4>仮リスト</h4>
<div id="tempList"></div>

<h4>注文リスト</h4>
<div id="captureArea">
<table>
<tr><th>品番</th><th>内容</th><th>数</th><th>削除</th></tr>
<tbody id="orderTable"></tbody>
</table>
</div>

<button onclick="shareImage()">📸 LINE共有</button>

<script>
let tempItems=[];
let orderItems=[];
let worker=null;
let ready=false;
let reading=false;

// OCR初期化
(async()=>{
  status.innerText="OCR準備中...";
  worker=await Tesseract.createWorker();
  await worker.loadLanguage('eng');
  await worker.initialize('eng');
  ready=true;
  status.innerText="準備OK";
})();

// OCR
ocrBtn.onclick=async function(){
  if(reading) return;
  if(!ready) return alert("準備中");

  let file=camera.files[0];
  if(!file) return alert("画像選択");

  reading=true;
  status.innerText="読み取り中...";

  let res=await worker.recognize(file);

  tempItems=[...new Set(
    (res.data.text.match(/[A-Z0-9\-]{4,}/g)||[])
  )];

  renderTemp();

  reading=false;
  status.innerText="完了";
};

// 仮リスト表示
function renderTemp(){
  tempList.innerHTML="";
  tempItems.forEach((c,i)=>{
    tempList.innerHTML+=`
    <div class="item">
      ${c}
      <input id="q${i}" type="number" value="1">
      <button onclick="addItem('${c}',${i})">追加</button>
      <button onclick="removeTemp(${i})">削除</button>
    </div>`;
  });
}

function removeTemp(i){
  tempItems.splice(i,1);
  renderTemp();
}

// 注文追加
function addItem(code,i){
  let qty=Number(document.getElementById("q"+i).value);

  let exist=orderItems.find(x=>x.code===code);

  if(exist){
    exist.qty+=qty;
  }else{
    orderItems.push({code,qty,comment:""});
  }

  tempItems.splice(i,1);
  renderTemp();
  renderOrder();
}

// 注文表示
function renderOrder(){
  orderTable.innerHTML="";
  orderItems.forEach((i,index)=>{
    orderTable.innerHTML+=`
    <tr>
      <td>${i.code}</td>
      <td><input value="${i.comment}" onchange="orderItems[${index}].comment=this.value"></td>
      <td><input type="number" value="${i.qty}" onchange="orderItems[${index}].qty=Number(this.value)"></td>
      <td><button onclick="removeOrder(${index})">✕</button></td>
    </tr>`;
  });
}

function removeOrder(i){
  orderItems.splice(i,1);
  renderOrder();
}

// 画像共有
function shareImage(){
  html2canvas(captureArea).then(canvas=>{
    canvas.toBlob(blob=>{
      let file=new File([blob],"order.png");
      if(navigator.share){
        navigator.share({files:[file]});
      }else{
        alert("共有未対応");
      }
    });
  });
}
</script>

</body>
</html>
