<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現場注文 完全安定版</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{font-family:sans-serif;padding:10px;}
input,button,select{font-size:14px;padding:6px;margin:3px;}
.row{display:flex;align-items:center;}
label{width:60px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
td,th{border:1px solid #000;padding:4px;text-align:center;}
td[contenteditable]{background:#eef;}
.qty{min-width:30px;display:inline-block;text-align:center;border-bottom:1px solid #000;}
textarea{width:100%;height:50px;margin-top:5px;}
button{cursor:pointer;}
</style>
</head>

<body>

<h3 id="genba">現場未取得</h3>
<button onclick="getAddress()">📍住所取得</button>

<div class="row">
<label>会社</label>
<select id="companySelect" onchange="changeCompany()"></select>
<button onclick="addCompany()">＋</button>
</div>

<div class="row">
<label>担当</label>
<select id="personSelect"></select>
<button onclick="addPerson()">＋</button>
</div>

<textarea id="comment" placeholder="例：〇日までにお願いします"></textarea>

<hr>

<input id="code" placeholder="貼る or OCR">
<button onclick="ocrScan()">📷</button>
<input type="file" id="ocr" accept="image/*" capture="environment" style="display:none">

<button onclick="addItem()">追加</button>

<h3>リスト</h3>
<table>
<thead>
<tr><th>No</th><th>品番</th><th>商品名</th><th>数量</th><th>削除</th></tr>
</thead>
<tbody id="list"></tbody>
</table>

<hr>

<button onclick="copyText()">コピー</button>
<button onclick="sendLine()">LINE</button>
<button onclick="sendMail()">メール</button>

<script>
const list = document.getElementById("list");
const codeInput = document.getElementById("code");

// ===== データ =====
let master = {};
let companies = {};

try{
 master = JSON.parse(localStorage.getItem("master")||"{}");
 companies = JSON.parse(localStorage.getItem("companies")||"{}");
}catch{}

// ===== 追加 =====
function addItem(){
 const input = codeInput.value;
 if(!input) return;

 processText(input);
 codeInput.value="";
}

// ===== 文字処理 =====
function processText(text){
 try{
  const lines = text.split(/\n/);

  lines.forEach(line=>{
   let t=line.trim();
   t=t.replace(/[^A-Za-z0-9\/\-]/g,"");

   if(!t || t.length<4) return;

   addOrUpdate(t, master[t]||"", 1);
  });

 }catch{}
}

// ===== 行追加 =====
function addOrUpdate(code,name,qty){
 try{
  const rows=document.querySelectorAll("#list tr");

  for(let tr of rows){
   if(tr.children[1].innerText===code){
    const span = tr.querySelector(".qty");
    let n = parseInt(span.innerText)||1;
    span.innerText = n + qty;
    return;
   }
  }

  const tr=document.createElement("tr");

  tr.innerHTML=`
  <td>${list.children.length+1}</td>
  <td>${code}</td>
  <td contenteditable onblur="saveName(this)">${name}</td>
  <td>
    <button onclick="changeQty(this,-1)">−</button>
    <span class="qty" contenteditable onblur="fixQty(this)">${qty}</span>
    <button onclick="changeQty(this,1)">＋</button>
  </td>
  <td><button onclick="this.closest('tr').remove();renum()">×</button></td>
  `;

  list.appendChild(tr);

 }catch{}
}

// ===== 商品名保存 =====
function saveName(td){
 try{
  const code=td.parentElement.children[1].innerText;
  const name=td.innerText.trim();

  if(name){
   master[code]=name;
   localStorage.setItem("master",JSON.stringify(master));
  }
 }catch{}
}

// ===== 数量変更 =====
function changeQty(btn,delta){
 try{
  const span = btn.parentElement.querySelector(".qty");
  let n = parseInt(span.innerText)||1;

  n += delta;
  if(n < 1) n = 1;

  span.innerText = n;
 }catch{}
}

// ===== 数量補正 =====
function fixQty(el){
 let n = parseInt(el.innerText);
 if(isNaN(n) || n < 1) n = 1;
 el.innerText = n;
}

// ===== 番号 =====
function renum(){
 document.querySelectorAll("#list tr").forEach((tr,i)=>{
  tr.children[0].innerText=i+1;
 });
}

// ===== OCR =====
function ocrScan(){
 document.getElementById("ocr").click();
}

document.getElementById("ocr").onchange=async e=>{
 try{
  const file=e.target.files[0];
  if(!file)return;

  const {data:{text}}=await Tesseract.recognize(file,'eng');
  processText(text);
 }catch{
  alert("OCR失敗");
 }
};

// ===== 貼り付け =====
codeInput.addEventListener("paste",e=>{
 try{
  const paste=e.clipboardData.getData("text");
  processText(paste);
  e.preventDefault();
 }catch{}
});

// ===== テキスト生成 =====
function makeText(){
 let text="";
 text+="【現場】"+(genba.innerText||"")+"\n";
 text+="【会社】"+(companySelect.value||"")+"\n";
 text+="【担当】"+(personSelect.value||"")+"\n";

 const comment=document.getElementById("comment").value;
 if(comment) text+="【備考】"+comment+"\n";

 text+="\n";

 document.querySelectorAll("#list tr").forEach((tr,i)=>{
  text+=(i+1)+". "+tr.children[1].innerText+" "+tr.children[2].innerText+" × "+tr.querySelector(".qty").innerText+"\n";
 });

 return text;
}

// ===== コピー =====
function copyText(){
 try{
  navigator.clipboard.writeText(makeText());
 }catch{
  alert(makeText());
 }
}

// ===== LINE =====
function sendLine(){
 window.open("https://line.me/R/msg/text/?"+encodeURIComponent(makeText()));
}

// ===== メール =====
function sendMail(){
 location.href="mailto:?subject=注文&body="+encodeURIComponent(makeText());
}

// ===== 住所 =====
function getAddress(){
 navigator.geolocation.getCurrentPosition(async pos=>{
  try{
   const res=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
   const data=await res.json();
   genba.innerText=data.display_name || "取得失敗";
  }catch{
   genba.innerText="取得失敗";
  }
 });
}

// ===== 会社 =====
function loadCompanies(){
 companySelect.innerHTML="";
 Object.keys(companies).forEach(c=>{
  const o=document.createElement("option");
  o.textContent=c;
  companySelect.appendChild(o);
 });
 changeCompany();
}

function addCompany(){
 const n=prompt("会社名");
 if(!n)return;
 companies[n]=[];
 localStorage.setItem("companies",JSON.stringify(companies));
 loadCompanies();
}

function changeCompany(){
 const listData=companies[companySelect.value]||[];
 personSelect.innerHTML="";
 listData.forEach(p=>{
  const o=document.createElement("option");
  o.textContent=p;
  personSelect.appendChild(o);
 });
}

function addPerson(){
 const c=companySelect.value;
 if(!c){alert("会社選択して");return;}

 const n=prompt("担当者");
 if(!n)return;

 companies[c].push(n);
 localStorage.setItem("companies",JSON.stringify(companies));
 changeCompany();
}

// 初期
loadCompanies();
</script>

</body>
</html>
